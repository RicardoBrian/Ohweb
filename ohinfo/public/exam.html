<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>시험 — OHinfo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
  <link rel="stylesheet" href="theme.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); line-height: 1.6; }
    .hidden { display: none !important; }

    /* 네비 */
    .nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--glass-nav);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(255,255,255,0.35), var(--shadow);
      padding: 0 28px; height: var(--nav-h);
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-left, .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-brand { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.02em; background: linear-gradient(135deg, var(--accent), #7c4dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; cursor: pointer; }
    .timer-badge {
      font-size: 0.95rem; font-weight: 800; letter-spacing: 0.04em;
      background: var(--glass-strong); border: 1px solid var(--border-card);
      border-radius: 50px; padding: 5px 18px;
      backdrop-filter: var(--blur);
    }
    .timer-badge.warning { color: #f59e0b; border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.12); }
    .timer-badge.danger  { color: #ef4444; border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.12); animation: pulse 1s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* 버튼 */
    .btn {
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border-radius: 50px;
      padding: 7px 18px; border: 1px solid var(--border);
      background: var(--glass); color: var(--text);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--highlight), var(--shadow);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s; white-space: nowrap;
    }
    .btn:hover { background: var(--glass-strong); box-shadow: var(--highlight), var(--shadow-md); }
    .btn:active { transform: scale(0.96); }
    .btn.accent { background: rgba(42,92,230,0.82); border-color: rgba(100,140,255,0.5); color: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 4px 20px rgba(42,92,230,0.35); }
    .btn.accent:hover { background: rgba(42,92,230,0.95); }
    .btn.ghost { border-color: transparent; background: transparent; box-shadow: none; }
    .btn.full { width: 100%; padding: 14px; font-size: 1rem; border-radius: var(--radius); }
    .btn.lg { padding: 13px 32px; font-size: 1rem; }
    .btn.danger { color: #ef4444; border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }
    /* 글로브 언어 선택 */
    .lang-globe { position: relative; flex-shrink: 0; }
    .lang-globe-btn { font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 50%; width: 32px; height: 32px; border: 1px solid var(--border-card); background: var(--glass); color: var(--sub); display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: var(--highlight); }
    .lang-globe-btn:hover { background: var(--glass-strong); color: var(--text); }
    .lang-globe-dd { position: absolute; top: calc(100% + 8px); right: 0; background: var(--glass-strong); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border-card); border-radius: var(--radius-sm); box-shadow: var(--shadow-md); overflow: hidden; min-width: 110px; z-index: 400; }
    .lang-globe-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; font-size: 0.85rem; font-weight: 700; cursor: pointer; color: var(--text); transition: 0.15s; }
    .lang-globe-item:hover { background: var(--accent-light); }
    .lang-globe-item .check { color: var(--accent); font-size: 0.8rem; }
    .dark-toggle { width: 42px; height: 24px; border-radius: 50px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); box-shadow: var(--highlight); cursor: pointer; position: relative; transition: 0.3s; flex-shrink: 0; }
    body.dark .dark-toggle { background: rgba(42,92,230,0.6); border-color: rgba(100,140,255,0.4); }
    .dark-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: transform 0.3s; }
    body.dark .dark-toggle::after { transform: translateX(18px); }

    /* 인풋 */
    .inp {
      width: 100%; padding: 11px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-card);
      background: var(--glass); color: var(--text);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--highlight);
      font-family: inherit; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .inp::placeholder { color: var(--sub); }
    .inp:focus { border-color: rgba(42,92,230,0.55); box-shadow: var(--highlight), 0 0 0 3px rgba(42,92,230,0.15); }
    textarea.inp { resize: vertical; min-height: 80px; }

    /* 카드 */
    .card {
      background: var(--glass-strong); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px; margin-bottom: 16px;
      box-shadow: var(--highlight), var(--shadow);
    }

    /* 스텝 1: 코드 입력 */
    .center-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - var(--nav-h)); padding: 20px; }
    .login-card { width: 100%; max-width: 400px; background: var(--glass-strong); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border); border-radius: 24px; padding: 40px 36px; box-shadow: var(--highlight), var(--shadow-md); }
    .login-card h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .login-card .sub { font-size: 0.88rem; color: var(--sub); margin-bottom: 28px; }
    .info-box { background: var(--accent-light); border: 1px solid rgba(42,92,230,0.2); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 0.85rem; color: var(--accent); font-weight: 600; margin-bottom: 18px; }

    /* 시험 레이아웃 */
    .exam-wrap { max-width: 780px; margin: 0 auto; padding: 28px 20px 80px; }

    /* 문제 카드 */
    .q-card {
      background: var(--glass-strong); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border-card); border-radius: var(--radius);
      padding: 24px; margin-bottom: 16px;
      box-shadow: var(--highlight), var(--shadow);
    }
    .q-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .q-num { font-size: 0.75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    .q-pts { font-size: 0.75rem; font-weight: 700; color: var(--sub); white-space: nowrap; }
    .q-title { font-size: 1rem; font-weight: 700; line-height: 1.55; margin-bottom: 8px; white-space: pre-wrap; word-break: break-all; }
    .q-content { font-size: 0.9rem; color: var(--sub); line-height: 1.7; margin-bottom: 14px; white-space: pre-wrap; word-break: break-all; }
    .q-img { width: 100%; max-width: 480px; border-radius: var(--radius-sm); margin-bottom: 14px; border: 1px solid var(--border-card); display: block; }

    /* 객관식 */
    .mc-options { display: flex; flex-direction: column; gap: 8px; }
    .mc-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-card); background: var(--glass);
      cursor: pointer; font-size: 0.92rem; transition: border-color 0.2s, background 0.2s;
    }
    .mc-opt:hover { border-color: rgba(42,92,230,0.35); background: var(--glass-strong); }
    .mc-opt.selected { border-color: var(--accent); background: var(--accent-light); font-weight: 700; }
    .mc-opt input[type="radio"] { display: none; }
    .mc-bullet { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-card); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 800; flex-shrink: 0; transition: 0.2s; }
    .mc-opt.selected .mc-bullet { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* 단답형 */
    .sa-input { margin-top: 4px; }

    /* 코딩 */
    .code-editor {
      font-family: 'Courier New', Courier, monospace; font-size: 0.88rem;
      min-height: 160px; background: rgba(15,20,40,0.9); color: #e8efff;
      border: 1px solid var(--border-card); border-radius: var(--radius-sm);
      padding: 14px; resize: vertical; line-height: 1.6;
    }
    .code-editor:focus { outline: none; border-color: rgba(42,92,230,0.5); box-shadow: 0 0 0 3px rgba(42,92,230,0.15); }
    .code-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .lang-sel { padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border-card); background: var(--glass); color: var(--text); font-family: inherit; font-size: 0.82rem; cursor: pointer; }
    .run-result {
      margin-top: 10px; padding: 12px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-card); background: rgba(15,20,40,0.7);
      font-family: 'Courier New', monospace; font-size: 0.82rem; color: #a8c0ff;
      white-space: pre-wrap; word-break: break-all; min-height: 40px;
      line-height: 1.6;
    }
    .run-result.error { color: #f87171; }
    .run-result.ok    { color: #86efac; }
    /* CodeMirror 오버라이드 */
    .CodeMirror { font-family: 'Courier New', Courier, monospace; font-size: 0.88rem; height: auto; min-height: 160px; border-radius: var(--radius-sm); border: 1px solid var(--border-card); background: rgba(15,20,40,0.92); color: #e8efff; line-height: 1.6; }
    .CodeMirror-focused { border-color: rgba(42,92,230,0.5); box-shadow: 0 0 0 3px rgba(42,92,230,0.15); }
    .CodeMirror-scroll { min-height: 160px; }
    .CodeMirror-gutters { background: rgba(15,20,40,0.95); border-right: 1px solid rgba(255,255,255,0.1); }
    .CodeMirror-linenumber { color: #556; }
    .cm-s-default .cm-keyword { color: #c792ea; } .cm-s-default .cm-string { color: #a5d6a7; } .cm-s-default .cm-number { color: #f78c6c; } .cm-s-default .cm-comment { color: #546e7a; font-style: italic; } .cm-s-default .cm-def { color: #82aaff; } .cm-s-default .cm-builtin { color: #ffcb6b; }
    .stdin-box { margin-top: 8px; }
    .stdin-box label { font-size: 0.75rem; color: var(--sub); font-weight: 700; display: block; margin-bottom: 4px; }
    .stdin-input { font-family: 'Courier New', monospace; font-size: 0.82rem; background: rgba(15,20,40,0.6); color: #e8efff; border: 1px solid var(--border-card); border-radius: var(--radius-sm); padding: 8px 10px; width: 100%; box-sizing: border-box; resize: vertical; min-height: 36px; }
    .tc-box { margin-top: 10px; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-card); background: var(--glass); font-size: 0.82rem; color: var(--sub); }
    .tc-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; }
    .tc-label { font-weight: 700; min-width: 60px; color: var(--accent); }

    /* 진행률 */
    .progress-bar { height: 4px; background: var(--border-card); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

    /* 결과 카드 */
    .result-card { text-align: center; padding: 40px 20px; }
    .result-score { font-size: 4rem; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 8px; }
    .result-total { font-size: 1rem; color: var(--sub); margin-bottom: 24px; }
    .result-items { text-align: left; margin-top: 24px; }
    .r-item { padding: 12px 0; border-bottom: 1px solid var(--border-card); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; font-size: 0.88rem; }
    .r-item:last-child { border-bottom: none; }
    .r-item .r-q { color: var(--sub); flex: 1; }
    .r-item .r-score { font-weight: 800; min-width: 60px; text-align: right; }
    .r-item .r-score.ok  { color: #22c55e; }
    .r-item .r-score.partial { color: #f59e0b; }
    .r-item .r-score.fail{ color: #ef4444; }
    .r-fb { font-size: 0.8rem; color: var(--sub); margin-top: 4px; }

    /* 로딩 */
    #loadingOverlay { position: fixed; inset: 0; z-index: 9000; display: none; justify-content: center; align-items: center; background: rgba(190,205,255,0.3); backdrop-filter: blur(12px); }
    body.dark #loadingOverlay { background: rgba(0,0,0,0.5); }
    .qna-fab {
      position: fixed; bottom: 22px; right: 22px; z-index: 400;
      width: 54px; height: 54px; border-radius: 50%; border: 1px solid var(--border-card);
      background: var(--accent-grad); color: #fff; cursor: pointer; font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md);
      text-decoration: none; transition: transform 0.15s;
    }
    .qna-fab:hover { transform: translateY(-2px); }
    .qna-fab .badge { position: absolute; top: -3px; right: -3px; width: 14px; height: 14px; border-radius: 50%; background: #ff3b30; border: 2px solid var(--bg-elevated); display: none; }
    .qna-fab .badge.on { display: block; }
    .qna-tip {
      position: absolute; right: calc(100% + 12px); top: 50%; transform: translateY(-50%) translateX(8px);
      background: #1a1d2e; color: #fff; font-size: 0.78rem; font-weight: 600; line-height: 1.4;
      padding: 10px 14px; border-radius: 12px; width: 200px; white-space: normal; text-align: left;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25); opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
    }
    .qna-tip::after {
      content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
      width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 5px solid #1a1d2e;
    }
    .qna-fab:hover .qna-tip { opacity: 1; transform: translateY(-50%) translateX(0); }
    .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 경고 배너 */
    .alert-banner { position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 500; padding: 10px 20px; background: rgba(239,68,68,0.9); color: #fff; text-align: center; font-weight: 700; font-size: 0.9rem; transform: translateY(-100%); transition: transform 0.3s, opacity 0.3s; opacity: 0; visibility: hidden; pointer-events: none; }
    .alert-banner.show { transform: translateY(0); opacity: 1; visibility: visible; pointer-events: auto; }

    /* 네비 유저 칩 */
    .nav-user { display:flex; align-items:center; gap:8px; background:var(--glass); border:1px solid var(--border-card); border-radius:50px; padding:5px 12px 5px 5px; cursor:pointer; position:relative; user-select:none; flex-shrink:0; transition:background 0.2s; }
    .nav-user:hover { background:var(--glass-strong); }
    .nav-avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#7c4dff); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:0.78rem; flex-shrink:0; overflow:hidden; }
    .nav-user-name { font-size:0.82rem; font-weight:700; }
    @media (max-width:520px) { .nav-user-name { display:none; } .nav-user { padding:4px; } }

    /* 유저 드롭다운 */
    .user-dropdown { position:absolute; top:calc(100% + 8px); right:0; min-width:160px; background:var(--glass-strong); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border-card); border-radius:var(--radius-sm); box-shadow:var(--shadow-md); z-index:300; overflow:hidden; }
    .user-dropdown-item { display:flex; align-items:center; gap:10px; padding:12px 16px; font-size:0.88rem; font-weight:700; cursor:pointer; color:var(--text); transition:0.15s; }
    .user-dropdown-item:hover { background:var(--accent-light); }
    .user-dropdown-item.danger { color:#ef4444; }
    .user-dropdown-sep { height:1px; background:var(--border-card); margin:0 10px; }

    /* 마이페이지 모달 */
    .modal-overlay { position:fixed; inset:0; z-index:600; background:rgba(0,0,0,0.35); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal-card { background:var(--glass-strong); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border-card); border-radius:var(--radius); box-shadow:var(--shadow-md); width:100%; max-width:360px; padding:28px 26px 22px; position:relative; }
    .modal-title { font-size:1.1rem; font-weight:900; letter-spacing:-0.02em; margin-bottom:20px; }
    .modal-close { position:absolute; top:14px; right:14px; width:28px; height:28px; border-radius:50%; background:var(--glass); border:1px solid var(--border-card); cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; color:var(--sub); transition:0.15s; font-family:inherit; }
    .modal-close:hover { background:var(--glass-strong); }
    .photo-section { text-align:center; margin-bottom:22px; }
    .photo-preview { width:80px; height:80px; border-radius:50%; margin:0 auto 10px; background:linear-gradient(135deg,var(--accent),#7c4dff); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:1.6rem; overflow:hidden; border:2px solid var(--border-card); }
    .photo-preview img { width:100%; height:100%; object-fit:cover; }
    .btn-photo-change { font-family:inherit; font-size:0.8rem; font-weight:700; cursor:pointer; border-radius:50px; padding:6px 16px; border:1px solid var(--border-card); background:var(--glass); color:var(--sub); transition:0.2s; }
    .btn-photo-change:hover { background:var(--glass-strong); color:var(--text); }
    .modal-section { margin-bottom:14px; }
    .modal-section-label { font-size:0.7rem; font-weight:700; color:var(--sub); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }
    .modal-inp { width:100%; padding:10px 13px; border-radius:var(--radius-sm); border:1px solid var(--border-card); background:var(--glass); color:var(--text); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); font-family:inherit; font-size:0.92rem; outline:none; margin-bottom:7px; transition:border-color 0.2s; }
    .modal-inp:last-of-type { margin-bottom:0; }
    .modal-inp:focus { border-color:rgba(42,92,230,0.55); }
    .modal-inp::placeholder { color:var(--sub); }
    .btn-modal-save { width:100%; padding:12px; border-radius:var(--radius); border:1px solid rgba(100,140,255,0.5); background:rgba(42,92,230,0.82); color:#fff; font-family:inherit; font-size:0.95rem; font-weight:700; cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,0.3),0 4px 16px rgba(42,92,230,0.3); transition:background 0.2s; margin-top:14px; }
    .btn-modal-save:hover { background:rgba(42,92,230,0.95); }
    .btn-modal-save:disabled { opacity:0.6; cursor:not-allowed; }
    .modal-msg { font-size:0.82rem; font-weight:600; margin-top:10px; text-align:center; min-height:18px; }
    .modal-msg.ok { color:#22c55e; }
    .modal-msg.err { color:#ef4444; }

    /* 제출 영역 */
    .submit-area { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 16px 24px; background: var(--glass-nav); backdrop-filter: var(--blur); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; }

    /* 반응형 */
    @media (max-width: 600px) {
      .exam-wrap { padding: 14px 12px 100px; }
      .q-card { padding: 16px 14px; border-radius: 14px; }
      .login-card { padding: 28px 20px; border-radius: 18px; }
      .login-card h1 { font-size: 1.2rem; }
      .nav { padding: 0 14px; }
      .timer-badge { padding: 4px 12px; font-size: 0.88rem; }
      .q-title { font-size: 0.95rem; }
      .result-score { font-size: 3rem; }
      .submit-area { padding: 12px 16px; }
    }
    @media (max-width: 400px) {
      .btn.lang-btn { padding: 4px 8px; font-size: 0.72rem; }
      .nav-brand { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner"></div></div>
<div id="alertBanner" class="alert-banner"></div>

<nav class="nav">
  <div class="nav-left">
    <span class="nav-brand" onclick="goHome()">OHinfo</span>
  </div>

window.openMyPage = () => {
  document.getElementById('userDropdown').classList.add('hidden');

  const prev = document.getElementById('mpPhotoPreview');
  if (_mpStudent.photoUrl) { prev.innerHTML = `<img src="${_mpStudent.photoUrl}">`; }
  else { prev.innerText = (_mpStudent.name||'?')[0]; }
  ['mpCurPw','mpNewPw','mpNewPw2'].forEach(id => document.getElementById(id).value = '');
  const msg = document.getElementById('mpMsg'); msg.innerText = ''; msg.className = 'modal-msg';
  document.getElementById('myPageOverlay').classList.remove('hidden');
};
window.closeMyPage = () => { document.getElementById('myPageOverlay').classList.add('hidden'); };
window.onPhotoChange = (input) => {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 200; let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h*MAX/w); w = MAX; } }
      else { if (h > MAX) { w = Math.round(w*MAX/h); h = MAX; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      _mpPhotoB64 = canvas.toDataURL('image/jpeg', 0.8);
      document.getElementById('mpPhotoPreview').innerHTML = `<img src="${_mpPhotoB64}">`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
};
window.saveMyPage = async () => {
  const msgEl = document.getElementById('mpMsg');
  msgEl.className = 'modal-msg'; msgEl.innerText = '';
  const curPw = document.getElementById('mpCurPw').value;
  const newPw = document.getElementById('mpNewPw').value;
  const newPw2 = document.getElementById('mpNewPw2').value;
  const updates = {};
  if (_mpPhotoB64) updates.photoUrl = _mpPhotoB64;
  const _t = UI[currentLang];
  if (newPw || curPw) {
    if (!curPw) { msgEl.className='modal-msg err'; msgEl.innerText=_t.mpCurPw+' '+(_t.mpErrCur||''); return; }
    if (curPw !== _mpStudent.password) { msgEl.className='modal-msg err'; msgEl.innerText=_t.mpErrCur; return; }
    if (newPw.length < 4) { msgEl.className='modal-msg err'; msgEl.innerText=_t.mpErrShort; return; }
    if (newPw !== newPw2) { msgEl.className='modal-msg err'; msgEl.innerText=_t.mpErrMatch; return; }
    updates.password = newPw;
  }
  if (!Object.keys(updates).length) { msgEl.className='modal-msg err'; msgEl.innerText=_t.mpErrCur; return; }
  const saveBtn = document.getElementById('mpSaveBtn'); saveBtn.disabled = true;
  try {
    await updateDoc(doc(db, 'students', _mpStudent.id), updates);
    Object.assign(_mpStudent, updates);
    saveSession(_mpStudent);
    renderAvatar(document.getElementById('navAvatar'), _mpStudent);
    msgEl.className='modal-msg ok'; msgEl.innerText=_t.mpOk;
    setTimeout(() => closeMyPage(), 1300);
  } catch(e) { msgEl.className='modal-msg err'; msgEl.innerText=_t.errPrefix+e.message; }
  saveBtn.disabled = false;
};

function updateLangCheck(lang) {

    const el = document.getElementById('lck-'+l);
    if (el) el.innerText = l === lang ? '✓' : '';
  });
}

function applyLangUI() {
  const t = UI[currentLang];
  // step0 title
  const t0 = document.getElementById('ui-title0'); if (t0) t0.innerText = t.examList;
  const backEl = document.getElementById('ui-back-btn'); if (backEl) backEl.innerText = t.back;
  // step2
  const sb = document.getElementById('ui-submit-btn'); if (sb) sb.innerText = t.submit;
  const ai = document.getElementById('alertInfo');
  if (ai) ai.innerHTML = `${t.alertInfo}: <b id="alertCount">${alertCount}</b>회`;
  // step3 result button
  const rb = document.querySelector('#step3 .btn.accent'); if (rb) rb.innerText = t.resultHome;
  // nav user dropdown
  const ddMy = document.querySelector('#userDropdown .user-dropdown-item:first-child'); if (ddMy) ddMy.innerHTML = `👤 ${t.mypage}`;
  const ddHome = document.querySelector('#userDropdown .user-dropdown-item.danger'); if (ddHome) ddHome.innerHTML = `🏠 ${t.home}`;
  // mypage modal
  const mpT = document.querySelector('#myPageOverlay .modal-title'); if (mpT) mpT.innerText = t.mpTitle;
  const mpPb = document.querySelector('.btn-photo-change'); if (mpPb) mpPb.innerText = t.mpPhotoBtn;
  const mpPwL = document.querySelector('.modal-section-label'); if (mpPwL) mpPwL.innerText = t.mpPwLabel;
  const mpC = document.getElementById('mpCurPw'); if (mpC) mpC.placeholder = t.mpCurPw;
  const mpN = document.getElementById('mpNewPw'); if (mpN) mpN.placeholder = t.mpNewPw;
  const mpN2 = document.getElementById('mpNewPw2'); if (mpN2) mpN2.placeholder = t.mpNewPw2;
  const mpSv = document.getElementById('mpSaveBtn'); if (mpSv) mpSv.innerText = t.mpSave;
  // re-render exam list with new language
  if (!document.getElementById('step0').classList.contains('hidden')) loadMyExams();
  // result score unit
  const rt = document.getElementById('resultTotal');
  if (rt && rt.dataset.score !== undefined) {
    const score = parseInt(rt.dataset.score); const total = parseInt(rt.dataset.total);
    if (!isNaN(score) && !isNaN(total)) {
      const pct = total > 0 ? Math.round(score/total*100) : 0;
      rt.innerText = `/ ${total}${t.pts2} (${pct}${t.pct})`;
    }
  }
}

// ── 내 시험 목록 로드 (step0) ──
async function loadMyExams() {
  const area = document.getElementById('examListArea');
  area.innerHTML = `<div style="color:var(--sub);font-size:0.85rem;">${UI[currentLang].loading}</div>`;
  try {
    const snap = await getDocs(collection(db, 'exam_assignments'));
    const assignments = snap.docs.map(d=>({id:d.id,...d.data()})).filter(a => {
      if (IS_MASTER) return true;
      const gradeOk = !a.grade || _nv(String(a.grade)) === SESSION.grade;
      const clsOk   = !a.class || _nv(String(a.class)) === SESSION.cls;
      const schoolOk = !a.schoolName || a.schoolName === SESSION.schoolName;
      return gradeOk && clsOk && schoolOk;
    });
    if (!assignments.length) {
      area.innerHTML = `<div style="color:var(--sub);font-size:0.85rem;text-align:center;padding:12px;">${UI[currentLang].noExams}</div>`;
      return;
    }
    // exam 제목 조회
    const examIds = [...new Set(assignments.map(a=>a.examId))];
    const examTitles = {};
    await Promise.all(examIds.map(async eid => {
      try {
        const es = await getDoc(doc(db,'exams',eid));
        if (es.exists()) examTitles[eid] = es.data().title || eid;
      } catch(e) {}
    }));
    // Check submission status for each assignment
    const submittedMap = {};
    await Promise.all(assignments.map(async a => {
      try {
        const progSnap = await getDoc(doc(db,'exam_progress',`${a.id}_${SESSION.id}`));
        if (progSnap.exists()) submittedMap[a.id] = progSnap.data();
      } catch(e) {}
    }));

    const t = UI[currentLang];
    area.innerHTML = assignments.map(a => {
      const prog = submittedMap[a.id];
      const isDone = prog?.status === 'submitted';
      const escapedId = a.id.replace(/'/g, "\\'");

      return `<div style="border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;">
        <div style="font-weight:700;font-size:0.97rem;margin-bottom:2px;">${examTitles[a.examId]||a.examId}</div>
        <div style="font-size:0.78rem;color:var(--sub);margin-bottom:10px;">${gradeStr}</div>
        ${isDone
          ? `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
               <span style="color:#22c55e;font-weight:800;font-size:0.9rem;">${t.submitted}</span>
               <span style="color:var(--sub);font-size:0.85rem;">${prog.totalScore??'?'} / ${prog.totalPoints??'?'}${t.pts}</span>
               <button class="btn ghost sm" onclick="showMyResult('${escapedId}')" style="margin-left:auto;">${t.viewResult}</button>
             </div>`
          : IS_MASTER
            ? `<button class="btn accent sm" onclick="enterExamDirect('${escapedId}')" style="white-space:nowrap;">${t.enterBtn}</button>`
            : `<div style="display:flex;gap:8px;align-items:center;">
               <input class="inp" id="code_${escapedId}" placeholder="${t.codeLabel}"
                 style="flex:1;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;font-size:0.9rem;"
                 oninput="this.value=this.value.toUpperCase()"
                 onkeydown="if(event.key==='Enter')enterExamWithCode('${escapedId}',this.value)">
               <button class="btn accent sm" onclick="enterExamWithCode('${escapedId}',document.getElementById('code_${escapedId}').value)" style="white-space:nowrap;">${t.enterBtn}</button>
             </div>
             <div id="err_${escapedId}" style="color:#ef4444;font-size:0.8rem;margin-top:6px;min-height:16px;"></div>`
        }
      </div>`;
    }).join('');
  } catch(e) {
    area.innerHTML = `<div style="color:#ef4444;font-size:0.82rem;">${e.message}</div>`;
  }
}

// ── 타이머 ──
function startTimer(seconds) {
  remainSec = seconds;
  renderTimer();
  timerInterval = setInterval(() => {
    remainSec--;
    renderTimer();
    if (remainSec <= 0) {
      clearInterval(timerInterval);
      submitExam(true);
    }
  }, 1000);
}

function renderTimer() {
  const el = document.getElementById('timerBadge');
  el.classList.remove('hidden');
  const m = Math.floor(remainSec / 60);
  const s = remainSec % 60;
  el.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (remainSec <= 60) { el.classList.remove('warning'); el.classList.add('danger'); }
  else if (remainSec <= 300) { el.classList.remove('danger'); el.classList.add('warning'); }
}

// ── 공통: asDoc으로 시험 시작 ──
async function startExamFromAs(asDoc, errEl) {
  const asData = asDoc.data();
  if (asData.status !== 'ON') { if(errEl) errEl.innerText = '현재 시험이 열려있지 않습니다.'; showLoading(false); return; }
  // 이미 제출했는지 확인
  const progRef = doc(db, 'exam_progress', `${asDoc.id}_${SESSION.id}`);
  const progSnap = await getDoc(progRef);
  if (progSnap.exists() && progSnap.data().status === 'submitted') {
    if(errEl) errEl.innerText = '이미 제출한 시험입니다.'; showLoading(false); return;
  }
  // 시험 정보 로드
  const examSnap = await getDoc(doc(db, 'exams', asData.examId));
  if (!examSnap.exists()) { if(errEl) errEl.innerText = '시험 정보를 찾을 수 없습니다.'; showLoading(false); return; }
  // 문제 로드 (orderBy fallback)
  let qSnap;
  try {
    qSnap = await getDocs(query(collection(db,'exam_questions'), where('examId','==',asData.examId), orderBy('order','asc')));
  } catch(e) {
    qSnap = await getDocs(query(collection(db,'exam_questions'), where('examId','==',asData.examId)));
  }
  questions = qSnap.docs.map((d,i)=>({id:d.id,idx:i,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
  if (!questions.length) { if(errEl) errEl.innerText = '시험 문제가 없습니다.'; showLoading(false); return; }
  currentAssignment = { asId: asDoc.id, ...asData };
  currentExam = { id: examSnap.id, ...examSnap.data() };
  await setDoc(progRef, {
    examId: asData.examId, asId: asDoc.id,
    studentId: SESSION.id, name: SESSION.name, grade: SESSION.grade, class: SESSION.cls, num: SESSION.num,
    status: 'started', alertCount: 0, startTime: serverTimestamp()
  }, { merge: true });
  showLoading(false);
  startExamUI();
}

window.enterExamWithCode = async (asId, code) => {
  const errEl = document.getElementById('err_' + asId);
  if (errEl) errEl.innerText = '';
  code = (code || '').trim().toUpperCase();
  if (!code) { if (errEl) errEl.innerText = '코드를 입력하세요.'; return; }
  showLoading(true);
  try {
    const asRef = doc(db, 'exam_assignments', asId);
    const asDoc = await getDoc(asRef);
    if (!asDoc.exists()) { if (errEl) errEl.innerText = '배정 정보를 찾을 수 없습니다.'; showLoading(false); return; }
    const asData = asDoc.data();
    const stored = String(asData.code || '').toUpperCase();
    const storedNum = String(Number(asData.code) || '').toUpperCase();
    if (code !== stored && code !== storedNum) {
      if (errEl) errEl.innerText = '코드가 맞지 않습니다.';
      showLoading(false); return;
    }
    await startExamFromAs(asDoc, errEl);
  } catch(e) {
    if (errEl) errEl.innerText = '오류: ' + e.message;
    showLoading(false);
  }
};

// ── 코드 직접 입장 ──
window.enterExam = async () => {
  const code = document.getElementById('examCode').value.trim().toUpperCase();
  const errEl = document.getElementById('step1Error');
  errEl.innerText = '';
  if (!code) { errEl.innerText = '코드를 입력하세요.'; return; }
  showLoading(true);
  try {
    // 코드로 조회 (숫자 코드 대응: 문자열로 먼저, 안 되면 숫자로도 시도)
    let snap = await getDocs(query(collection(db,'exam_assignments'), where('code','==',code)));
    if (snap.empty) {
      const numCode = Number(code);
      if (!isNaN(numCode)) snap = await getDocs(query(collection(db,'exam_assignments'), where('code','==',numCode)));
    }
    if (snap.empty) { errEl.innerText = '존재하지 않는 코드입니다.'; showLoading(false); return; }
    const asDoc = snap.docs[0];
    const asData = asDoc.data();
    // 학년/반 확인 (마스터는 통과)
    if (!IS_MASTER && (_nv(String(asData.grade)) !== SESSION.grade || _nv(String(asData.class)) !== SESSION.cls)) {
      errEl.innerText = `이 시험은 ${asData.grade}학년 ${asData.class}반 대상입니다. (내 정보: ${SESSION.grade}학년 ${SESSION.cls}반)`;
      showLoading(false); return;
    }
    const schoolOk = !asData.schoolName || asData.schoolName === SESSION.schoolName;
    if (!schoolOk) { errEl.innerText = '이 시험은 해당 학교 학생만 응시할 수 있습니다.'; showLoading(false); return; }
    await startExamFromAs(asDoc, errEl);
  } catch(e) {
    errEl.innerText = '오류: ' + e.message;
    showLoading(false);
  }
};

// ── Pyodide 로드 ──
async function loadPyodide() {
  if (pyodide || pyodideLoading) return;
  pyodideLoading = true;
  try {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js';
    document.head.appendChild(s);
    await new Promise(r => s.onload = r);
    pyodide = await window.loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.2/full/' });

  }

// ── 문제 렌더링 ──
function renderQuestions() {
  const wrap = document.getElementById('questionsWrap');
  wrap.innerHTML = questions.map((q, i) => renderQuestion(q, i)).join('');
  requestAnimationFrame(() => initCodeEditors());
  // 기존 답 복원
  questions.forEach((q, i) => {
    if (q.type === 'mc') {
      const saved = answers[i]?.value;
      if (saved !== undefined) {
        document.querySelectorAll(`[name="mc_${i}"]`).forEach(r => {
          if (r.value == saved) { r.checked = true; r.closest('.mc-opt')?.classList.add('selected'); }
        });
      }
    } else if (q.type === 'sa') {
      const saved = answers[i]?.value || '';
      const el = document.getElementById(`sa_${i}`);
      if (el) el.value = saved;
    } else if (q.type === 'code') {
      const saved = codeAnswers[i]?.code || getDefaultCode(q, currentLang);
      const el = document.getElementById(`code_${i}`);
      if (el) el.value = saved;
    }
  });
  updateProgress();
}

function getQTitle(q) {
  if (currentLang === 'zh' && q.titleZh) return q.titleZh;
  if (currentLang === 'ru' && q.titleRu) return q.titleRu;
  if (currentLang === 'en' && q.titleEn) return q.titleEn;
  return q.title || '';
}
function getQContent(q) {
  if (currentLang === 'zh' && q.contentZh) return q.contentZh;
  if (currentLang === 'ru' && q.contentRu) return q.contentRu;
  if (currentLang === 'en' && q.contentEn) return q.contentEn;
  return q.content || '';
}
function getOptions(q) {
  if (currentLang === 'zh' && q.optionsZh?.length) return q.optionsZh;
  if (currentLang === 'ru' && q.optionsRu?.length) return q.optionsRu;
  if (currentLang === 'en' && q.optionsEn?.length) return q.optionsEn;
  return q.options || [];
}

function getDefaultCode(q, lang) {
  if (lang === 'zh' || lang === 'ru') {
    // Python only for zh/ru
    return q.boilerplate || '';
  }
  return q.boilerplate || '';
}

const typeLabels = { mc: { ko:'객관식', zh:'选择题', ru:'Тест', en:'MCQ' }, sa: { ko:'단답형', zh:'简答题', ru:'Ответ', en:'Short' }, code: { ko:'코딩', zh:'编程', ru:'Код', en:'Code' } };

function initCodeEditors() {
  questions.forEach((q, i) => {
    if (q.type !== 'code') return;
    const ta = document.getElementById(`code_${i}`);
    if (!ta || cmInstances[i]) return;
    const cm = CodeMirror.fromTextArea(ta, {
      mode: 'python',
      lineNumbers: true,
      indentUnit: 4,
      tabSize: 4,
      indentWithTabs: false,
      autoCloseBrackets: true,
      extraKeys: {
        'Tab': cm => cm.execCommand('indentMore'),
        'Shift-Tab': cm => cm.execCommand('indentLess'),
        'Enter': (cm) => {
          const cursor = cm.getCursor();
          const line = cm.getLine(cursor.line);
          const indent = line.match(/^(\s*)/)[1];
          const extraIndent = line.trimEnd().endsWith(':') ? '    ' : '';
          cm.replaceSelection('\n' + indent + extraIndent, 'end');
        }
      }
    });
    cm.on('change', () => saveCode(i, cm.getValue()));
    cmInstances[i] = cm;
    // restore saved answer
    if (codeAnswers[i]?.code) cm.setValue(codeAnswers[i].code);
  });
}

function renderQuestion(q, i) {
  const num = `Q${i+1}`;
  const typeLabel = typeLabels[q.type]?.[currentLang] || q.type;
  const title = getQTitle(q);
  const content = getQContent(q);
  const pts = q.points || 0;
  let body = '';

  if (q.type === 'mc') {
    const opts = getOptions(q);
    body = `<div class="mc-options">` + opts.map((opt, oi) =>
      `<label class="mc-opt ${answers[i]?.value == oi ? 'selected' : ''}" onclick="selectMC(${i},${oi})">
        <input type="radio" name="mc_${i}" value="${oi}">
        <div class="mc-bullet">${String.fromCharCode(9312+oi)}</div>
        <span>${opt}</span>
      </label>`
    ).join('') + `</div>`;
  } else if (q.type === 'sa') {
    body = `<textarea class="inp sa-input" id="sa_${i}" rows="3" placeholder="${currentLang==='zh'?'请输入答案...':currentLang==='ru'?'Введите ответ...':currentLang==='en'?'Enter your answer...':'답을 입력하세요...'}" oninput="saveSA(${i},this.value)"></textarea>`;
  } else if (q.type === 'code') {
    const tcHtml = (q.inEx || q.outEx) ? `<div class="tc-box">
      ${q.inDesc ? `<div class="tc-row"><span class="tc-label">${currentLang==='zh'?'输入说明':currentLang==='ru'?'Ввод':currentLang==='en'?'Input format':'입력 형식'}</span><span>${q.inDesc}</span></div>` : ''}
      ${q.outDesc ? `<div class="tc-row"><span class="tc-label">${currentLang==='zh'?'输出说明':currentLang==='ru'?'Вывод':currentLang==='en'?'Output format':'출력 형식'}</span><span>${q.outDesc}</span></div>` : ''}
      ${q.inEx ? `<div class="tc-row"><span class="tc-label">${currentLang==='zh'?'输入例':currentLang==='ru'?'Пример':currentLang==='en'?'Sample input':'예시 입력'}</span><pre style="margin:0;font-size:0.82rem;">${q.inEx}</pre></div>` : ''}
      ${q.outEx ? `<div class="tc-row"><span class="tc-label">${currentLang==='zh'?'输出例':currentLang==='ru'?'Ответ':currentLang==='en'?'Sample output':'예시 출력'}</span><pre style="margin:0;font-size:0.82rem;">${q.outEx}</pre></div>` : ''}
    </div>` : '';
    body = `
      ${tcHtml}
      <div class="code-meta">
        <span style="font-size:0.82rem;font-weight:700;color:var(--sub);">Python</span>
      </div>
      <textarea class="code-editor" id="code_${i}" spellcheck="false">${escHtml(getDefaultCode(q, currentLang))}</textarea>
      <div class="stdin-box">
        <label>${UI[currentLang].stdin}</label>
        <textarea class="stdin-input" id="stdin_${i}" placeholder="${UI[currentLang].stdinPlaceholder}" rows="2"></textarea>
      </div>
      <button class="btn run-btn" id="runBtn_${i}" style="margin-top:8px;" onclick="runCode(${i})" ${pyodide?'':'disabled'}>
        ${pyodide ? UI[currentLang].run + ' ▶' : UI[currentLang].pyodideLoading}
      </button>
      <div id="runResult_${i}" class="run-result" style="display:none;"></div>
    `;
  }

  const imgHtml = q.imageUrl ? `<img class="q-img" src="${q.imageUrl}" alt="" loading="lazy">` : '';

  return `<div class="q-card" id="qcard_${i}">
    <div class="q-header">
      <span class="q-num">${num} · ${typeLabel}</span>
      <span class="q-pts">${pts}점</span>
    </div>
    <div class="q-title">${escHtml(title)}</div>
    ${content ? `<div class="q-content">${escHtml(content)}</div>` : ''}
    ${imgHtml}
    ${body}
  </div>`;
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 답 저장 ──
window.selectMC = (idx, optIdx) => {
  answers[idx] = { value: optIdx, lang: currentLang };
  document.querySelectorAll(`[name="mc_${idx}"]`).forEach(r => r.closest('.mc-opt')?.classList.remove('selected'));
  const chosen = document.querySelector(`[name="mc_${idx}"][value="${optIdx}"]`);
  if (chosen) { chosen.checked = true; chosen.closest('.mc-opt')?.classList.add('selected'); }
  updateProgress();
};

window.saveSA = (idx, val) => { answers[idx] = { value: val, lang: currentLang }; updateProgress(); };
window.saveCode = (idx, val) => { codeAnswers[idx] = { code: val, lang: 'python' }; updateProgress(); };

function updateProgress() {
  let filled = 0;
  questions.forEach((q, i) => {
    if (q.type === 'mc' && answers[i]?.value !== undefined) filled++;
    else if (q.type === 'sa' && answers[i]?.value?.trim()) filled++;
    else if (q.type === 'code' && codeAnswers[i]?.code?.trim()) filled++;
  });
  const pct = questions.length ? (filled / questions.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── 코드 실행 ──
window.runCode = async (idx) => {
  const cm = cmInstances[idx];
  const resultEl = document.getElementById(`runResult_${idx}`);
  const btn = document.getElementById(`runBtn_${idx}`);
  if (!pyodide) { resultEl.style.display='block'; resultEl.className='run-result error'; resultEl.innerText=UI[currentLang].pyodideLoading; return; }
  const code = cm ? cm.getValue() : (document.getElementById(`code_${idx}`)?.value || '');
  const stdinVal = document.getElementById(`stdin_${idx}`)?.value || '';
  btn.innerText = UI[currentLang].running;
  btn.disabled = true;
  resultEl.style.display = 'block';
  resultEl.className = 'run-result';
  resultEl.innerText = UI[currentLang].running;
  try {
    pyodide.runPython(`
import sys, io as _io
_buf = _io.StringIO()
sys.stdout = _buf
sys.stdin = _io.StringIO(${JSON.stringify(stdinVal)})
`);
    await pyodide.runPythonAsync(code);
    pyodide.runPython(`sys.stdout = sys.__stdout__\nsys.stdin = sys.__stdin__`);
    const output = pyodide.runPython(`_buf.getvalue()`);
    resultEl.className = 'run-result ok';
    resultEl.innerText = output || UI[currentLang].noOutput;
    saveCode(idx, code);
  } catch(e) {
    try { pyodide.runPython(`import sys; sys.stdout = sys.__stdout__; sys.stdin = sys.__stdin__`); } catch(e2) {}
    resultEl.className = 'run-result error';
    resultEl.innerText = String(e);
  }
  btn.innerText = UI[currentLang].run + ' ▶';
  btn.disabled = false;
};

// ── 제출 ──
window.submitExam = async (isAuto = false) => {
  if (submitted) return;
  if (!isAuto) {
    const unanswered = questions.filter((q, i) => {
      if (q.type === 'mc') return answers[i]?.value === undefined;
      if (q.type === 'sa') return !answers[i]?.value?.trim();
      if (q.type === 'code') return !codeAnswers[i]?.code?.trim();
      return false;
    });
    if (unanswered.length > 0) {
      const msg = { ko: `${unanswered.length}문항이 미답입니다. 제출하시겠습니까?`, zh: `${unanswered.length}题未作答，确定提交？`, ru: `${unanswered.length} вопросов без ответа. Отправить?` };
      if (!confirm(msg[currentLang])) return;
    }
  }
  submitted = true;
  clearInterval(timerInterval);
  document.getElementById('timerBadge').classList.add('hidden');
  showLoading(true);

  try {
    // 채점
    let totalScore = 0;
    let totalPoints = 0;
    const resultItems = [];

    for (let i = 0; i < questions.length; i++) {
      const q = questions[i];
      totalPoints += (q.points || 0);
      let score = 0;
      let feedback = '';
      let value = '';

      if (q.type === 'mc') {
        value = answers[i]?.value !== undefined ? String(answers[i].value) : '';
        const correct = String(q.answer ?? '');
        if (value !== '' && value === correct) { score = q.points || 0; feedback = UI[currentLang].correct; }
        else { feedback = `${UI[currentLang].wrong}${String.fromCharCode(9312 + parseInt(correct))})`; }

      } else if (q.type === 'sa') {
        value = answers[i]?.value?.trim() || '';
        const correct = String(q.answer || '').trim();
        if (value && value.toLowerCase() === correct.toLowerCase()) { score = q.points || 0; feedback = UI[currentLang].correct; }
        else { feedback = `${UI[currentLang].wrong}${correct})`; }

      } else if (q.type === 'code') {
        const cm = cmInstances[i];
        const code = cm ? cm.getValue() : (codeAnswers[i]?.code || '');
        value = code;
        // 테스트케이스 실행
        if (pyodide && q.testCases?.length) {
          let passCount = 0;
          for (const tc of q.testCases) {
            try {
              const inputData = String(tc.input || '');
              const testCode = `
import sys, io as _io
_buf = _io.StringIO()
_in = _io.StringIO(${JSON.stringify(inputData)})
sys.stdout = _buf
sys.stdin = _in
${code}
sys.stdout = sys.__stdout__
sys.stdin = sys.__stdin__
_result = _buf.getvalue()
`;
              pyodide.runPython(testCode);
              const result = String(pyodide.runPython('_result'));
              const normalize = s => String(s||'').replace(/\r\n/g,'\n').trimEnd();
              if (normalize(result) === normalize(tc.expected)) passCount++;
            } catch(e) {}
          }
          const ratio = passCount / q.testCases.length;
          score = Math.round((q.points || 0) * ratio);
          feedback = `${passCount}/${q.testCases.length} ${UI[currentLang].testPass}`;
        } else {
          feedback = UI[currentLang].manualGrade;
        }
      }

      totalScore += score;
      resultItems.push({ qIdx: i, title: getQTitle(q), value, score, maxScore: q.points||0, feedback });

      // results에 저장
      await addDoc(collection(db, 'exam_results'), {
        asId: currentAssignment.asId,
        examId: currentAssignment.examId,
        studentId: SESSION.id, name: SESSION.name,
        grade: SESSION.grade, class: SESSION.cls, num: SESSION.num,
        lang: currentLang, qIdx: i,
        value, score, maxScore: q.points||0, feedback,
        createdAt: serverTimestamp()
      });
    }

    // progress 업데이트
    const progRef = doc(db, 'exam_progress', `${currentAssignment.asId}_${SESSION.id}`);
    await setDoc(progRef, {
      status: 'submitted', totalScore, totalPoints,
      alertCount, submitTime: serverTimestamp()
    }, { merge: true });

    showLoading(false);
    showResult(totalScore, totalPoints, resultItems);
  } catch(e) {
    showLoading(false);
    alert(UI[currentLang].submitErr + e.message);
    submitted = false;
  }
};

function showResult(score, total, items) {
  ['step0','step1','step2'].forEach(id => document.getElementById(id)?.classList.add('hidden'));
  document.getElementById('step3').classList.remove('hidden');
  document.getElementById('timerBadge').classList.add('hidden');
  const pct = total > 0 ? Math.round(score / total * 100) : 0;
  const t = UI[currentLang];
  document.getElementById('resultScore').innerText = score;
  const rtEl = document.getElementById('resultTotal');
  rtEl.innerText = `/ ${total}${t.pts2} (${pct}${t.pct})`;
  rtEl.dataset.score = score; rtEl.dataset.total = total;
  document.getElementById('resultEmoji').innerText = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '📚' : '💪';
  document.getElementById('resultDetails').innerHTML = items.map(r => {
    const cls = r.score === r.maxScore ? 'ok' : r.score > 0 ? 'partial' : 'fail';
    return `<div class="r-item">
      <div class="r-q">Q${r.qIdx+1}. ${escHtml(r.title)}<div class="r-fb">${escHtml(r.feedback)}</div></div>
      <div class="r-score ${cls}">${r.score}/${r.maxScore}${t.pts2}</div>
    </div>`;
  }).join('');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 초기화 ──
function init() {
  setLang(currentLang);
}
init();

// window 노출
window.enterExam = window.enterExam;
window.setLang = setLang;
window.toggleDark = toggleDark;
window.goHome = goHome;

if (_st.id) {
  onSnapshot(doc(db, 'qna_threads', _st.id), snap => {
    const badge = document.getElementById('qnaBadge');
    if (badge) badge.classList.toggle('on', !!(snap.exists() && snap.data().unreadByStudent));
  });
}
</script>
