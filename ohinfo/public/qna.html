<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>질문하기 — OHinfo</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="theme.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); line-height: 1.6; height: 100vh; overflow: hidden; }
  .hidden { display: none !important; }

  .nav {
    position: sticky; top: 0; z-index: 200;
    background: var(--glass-nav); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(255,255,255,0.35), var(--shadow);
    padding: 0 16px; height: var(--nav-h);
    display: flex; align-items: center; gap: 10px;
  }
  .nav-back {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border-card);
    background: var(--glass); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center;
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); box-shadow: var(--highlight); flex-shrink: 0; font-size: 1.1rem; text-decoration: none;
  }
  .nav-title { font-weight: 800; font-size: 0.98rem; flex: 1; }
  .nav-sub { font-size: 0.72rem; color: var(--sub); font-weight: 600; }

  .page { display: flex; flex-direction: column; height: calc(100vh - var(--nav-h)); }

  .chat-body {
    flex: 1; overflow-y: auto; padding: 18px 14px 10px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-empty { text-align: center; color: var(--sub); font-size: 0.85rem; padding: 60px 20px; }
  .chat-empty .icon { font-size: 2.6rem; margin-bottom: 10px; }

  .msg-row { display: flex; flex-direction: column; max-width: 78%; gap: 4px; }
  .msg-row.mine { align-self: flex-end; align-items: flex-end; }
  .msg-row.theirs { align-self: flex-start; align-items: flex-start; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 18px; font-size: 0.9rem; white-space: pre-wrap; word-break: break-word;
    box-shadow: var(--shadow-sm);
  }
  .msg-row.mine .msg-bubble {
    background: var(--accent-grad); color: #fff; border-bottom-right-radius: 5px;
  }
  .msg-row.theirs .msg-bubble {
    background: var(--glass-strong); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border-card); color: var(--text); border-bottom-left-radius: 5px;
  }
  .msg-time { font-size: 0.66rem; color: var(--sub); padding: 0 4px; display: none; }
  .msg-row.show-time .msg-time { display: block; }
  .msg-atts { display: flex; flex-wrap: wrap; gap: 6px; }
  .msg-att {
    display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 12px;
    font-size: 0.78rem; text-decoration: none; max-width: 220px; overflow: hidden; cursor: pointer;
    background: rgba(255,255,255,0.35); border: 1px solid var(--border-card);
  }
  .msg-row.mine .msg-att { color: #fff; background: rgba(255,255,255,0.22); }
  .msg-row.theirs .msg-att { color: var(--text); }
  .msg-att span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .msg-att img { width: 130px; max-height: 160px; border-radius: 12px; object-fit: cover; display: block; }
  .lightbox { display: none; position: fixed; inset: 0; z-index: 5000; background: rgba(10,10,16,0.9); align-items: center; justify-content: center; padding: 24px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; object-fit: contain; }

  .lock-banner {
    margin: 0 14px 8px; padding: 10px 14px; border-radius: var(--radius-sm);
    background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.25);
    color: #b91c1c; font-size: 0.8rem; font-weight: 700; text-align: center;
  }
  body.dark .lock-banner { color: #ff8a80; }

  .composer {
    border-top: 1px solid var(--border-card); background: var(--glass-nav);
    backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .attach-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .attach-chip { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 50px; background: var(--glass); border: 1px solid var(--border-card); font-size: 0.76rem; }
  .attach-chip button { border: none; background: none; cursor: pointer; color: var(--sub); font-size: 0.8rem; }
  .composer-row { display: flex; align-items: flex-end; gap: 8px; }
  .attach-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-card);
    background: var(--glass); cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .composer-input {
    flex: 1; resize: none; max-height: 110px; padding: 10px 14px; border-radius: 20px;
    border: 1px solid var(--border-card); background: var(--glass); color: var(--text);
    font-family: inherit; font-size: 0.9rem; outline: none;
  }
  .composer-input:focus { border-color: rgba(0,113,227,0.5); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; border: none; flex-shrink: 0;
    background: var(--accent-grad); color: #fff; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm);
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .composer.locked .composer-input, .composer.locked .attach-btn, .composer.locked .send-btn { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-back" href="home.html" title="뒤로">←</a>
  <div>
    <div class="nav-title" id="navTitle">선생님께 질문하기</div>
    <div class="nav-sub" id="navSub"></div>
  </div>
</nav>

<div class="page">
  <div class="chat-body" id="chatBody"></div>
  <div class="lock-banner hidden" id="lockBanner"></div>
  <div class="composer" id="composer">
    <div class="attach-preview" id="attachPreview"></div>
    <div class="composer-row">
      <button class="attach-btn" id="attachBtn" title="파일 첨부">📎</button>
      <input type="file" id="fileInput" multiple accept="image/*,.pdf,.doc,.docx,.hwp,.txt" style="display:none">
      <textarea class="composer-input" id="msgInput" rows="1" placeholder="메시지를 입력하세요…"></textarea>
      <button class="send-btn" id="sendBtn" title="전송">➤</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" onclick="event.stopPropagation()">
</div>

<script type="module">
import { db } from './firebase-config.js';
import {
  doc, getDoc, setDoc, updateDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { loadSession } from './session.js';

const student = loadSession();
if (!student) { window.location.href = 'index.html'; throw new Error('no session'); }
const lang = localStorage.getItem('ohinfo_lang') || 'ko';
if (localStorage.getItem('dark') === '1') document.body.classList.add('dark');

const LANGS = {
  ko: { title:'선생님께 질문하기', placeholder:'메시지를 입력하세요…', empty:'아직 대화가 없어요.\n궁금한 걸 편하게 물어보세요!',
        locked:'🌙 오후 10시~오전 7시에는 메시지를 보낼 수 없어요.', you:'나', teacher:'선생님' },
  zh: { title:'向老师提问', placeholder:'请输入消息…', empty:'还没有对话。\n有什么问题尽管问吧！',
        locked:'🌙 晚上10点至早上7点无法发送消息。', you:'我', teacher:'老师' },
  ru: { title:'Вопрос учителю', placeholder:'Введите сообщение…', empty:'Пока нет сообщений.\nЗадайте свой вопрос!',
        locked:'🌙 С 22:00 до 07:00 отправка сообщений недоступна.', you:'Я', teacher:'Учитель' },
  en: { title:'Ask your teacher', placeholder:'Type a message…', empty:'No messages yet.\nFeel free to ask anything!',
        locked:'🌙 Messages are unavailable from 10 PM to 7 AM.', you:'Me', teacher:'Teacher' },
};
const L = LANGS[lang] || LANGS.ko;
document.getElementById('navTitle').innerText = L.title;
document.getElementById('msgInput').placeholder = L.placeholder;
{
  const _d = v => String(v||'').replace(/[^0-9]/g,'') || String(v||'').trim();
  const g = _d(student.grade), c = _d(student.class), n = String(student.number||'').trim();
  document.getElementById('navSub').innerText = `${student.schoolName||''}${g?` ${g}학년`:''}${c?` ${c}반`:''}${n?` ${n}번`:''} · ${student.name}`;
}

// ── 업로드 (GAS → Drive) ──
const FILE_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbzepbMXVCYAwoBcmFbmWQWRes1bSGfvhVHKGFNX6VHanVy-1mirxLkyHlROp0-agBX2/exec';
const FILE_UPLOAD_SECRET = 'ohweb-upload-2026';
const _safe = s => String(s||'').replace(/[\\/:*?"<>|]/g,'_').trim();
function fileToBase64(file) {
  return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(String(r.result).split(',')[1]); r.onerror = rej; r.readAsDataURL(file); });
}
async function uploadOneFile(file, folder, filename) {
  const base64 = await fileToBase64(file);
  const res = await fetch(FILE_UPLOAD_URL, { method: 'POST', body: JSON.stringify({ secret: FILE_UPLOAD_SECRET, folder, filename, mimeType: file.type || 'application/octet-stream', base64 }) });
  const data = await res.json();
  if (!data || data.error || !data.url) throw new Error('업로드 실패: ' + (data && data.error || '알수없음'));
  return { name: file.name, url: data.url };
}
async function notifyTeacher(preview) {
  try {
    await fetch(FILE_UPLOAD_URL, { method: 'POST', body: JSON.stringify({
      secret: FILE_UPLOAD_SECRET, action: 'notify',
      studentName: student.name, school: student.schoolName, grade: student.grade, class: student.class, number: student.number,
      preview,
    }) });
  } catch (e) { /* 알림 실패는 조용히 무시 (메시지 전송 자체는 성공) */ }
}

// ── 시간 잠금 (22:00~07:00, KST) ──
function kstHour() {
  const utcMs = Date.now() + new Date().getTimezoneOffset() * 60000;
  return new Date(utcMs + 9 * 3600000).getHours();
}
function applyLock() {
  const h = kstHour();
  const locked = (h >= 22 || h < 7);
  document.getElementById('composer').classList.toggle('locked', locked);
  const banner = document.getElementById('lockBanner');
  banner.classList.toggle('hidden', !locked);
  if (locked) banner.innerText = L.locked;
}
applyLock();
setInterval(applyLock, 60000);

// ── 채팅 ──
const threadRef = doc(db, 'qna_threads', student.id);
const msgsRef = collection(db, 'qna_threads', student.id, 'messages');
let pendingFiles = [];

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function isImg(name) { return /\.(jpe?g|png|gif|webp|bmp|heic|heif)$/i.test(String(name||'')); }
function fmtTime(ts) {
  const ms = ts?.toMillis ? ts.toMillis() : (ts?.seconds ? ts.seconds*1000 : 0);
  if (!ms) return '';
  return new Date(ms).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function driveId(url) { const m = String(url||'').match(/\/d\/([^/]+)|[?&]id=([^&]+)/); return m ? (m[1]||m[2]) : ''; }
window.openLightbox = (url) => {
  const id = driveId(url);
  document.getElementById('lightboxImg').src = id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1600` : url;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = () => {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
};
function renderAtt(f) {
  const id = driveId(f.url);
  if (isImg(f.name) && id) return `<div class="msg-att" onclick="openLightbox('${f.url.replace(/'/g,"\\'")}')"><img src="https://drive.google.com/thumbnail?id=${id}&sz=w400" referrerpolicy="no-referrer"></div>`;
  return `<a class="msg-att" href="${f.url}" target="_blank" rel="noopener">📎 <span>${esc(f.name)}</span></a>`;
}

const chatBody = document.getElementById('chatBody');
onSnapshot(query(msgsRef, orderBy('createdAt', 'asc')), snap => {
  if (snap.empty) {
    chatBody.innerHTML = `<div class="chat-empty"><div class="icon">💬</div><p>${esc(L.empty).replace(/\n/g,'<br>')}</p></div>`;
    return;
  }
  chatBody.innerHTML = snap.docs.map(d => {
    const m = d.data();
    const mine = m.sender === 'student';
    const atts = Array.isArray(m.attachments) && m.attachments.length ? `<div class="msg-atts">${m.attachments.map(renderAtt).join('')}</div>` : '';
    const text = m.text ? `<div class="msg-bubble">${esc(m.text)}</div>` : '';
    return `<div class="msg-row ${mine?'mine':'theirs'}" onclick="this.classList.toggle('show-time')">${text}${atts}<div class="msg-time">${fmtTime(m.createdAt)}</div></div>`;
  }).join('');
  chatBody.scrollTop = chatBody.scrollHeight;
  // 선생님 답장 확인 처리 + 읽음 표시
  updateDoc(threadRef, { unreadByStudent: false }).catch(()=>{});
  snap.docs.forEach(d => {
    const m = d.data();
    if (m.sender === 'admin' && !m.readAt) updateDoc(d.ref, { readAt: serverTimestamp() }).catch(()=>{});
  });
});

// 최초 진입 시 스레드 문서 없으면 생성
getDoc(threadRef).then(snap => {
  if (!snap.exists()) {
    setDoc(threadRef, {
      studentName: student.name, schoolName: student.schoolName || '', grade: student.grade || '', class: student.class || '', number: student.number || '',
      emailNotify: true, unreadByAdmin: false, unreadByStudent: false, lastMessageAt: serverTimestamp(), lastNotifiedAt: null,
    });
  }
});

// ── 첨부 미리보기 ──
document.getElementById('attachBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => {
  pendingFiles.push(...Array.from(e.target.files || []));
  renderAttachPreview();
  e.target.value = '';
};
function renderAttachPreview() {
  const box = document.getElementById('attachPreview');
  box.innerHTML = pendingFiles.map((f, i) => `<span class="attach-chip">📎 ${esc(f.name)}<button data-i="${i}">✕</button></span>`).join('');
  box.querySelectorAll('button').forEach(b => b.onclick = () => { pendingFiles.splice(+b.dataset.i, 1); renderAttachPreview(); });
}

// ── 전송 ──
const msgInput = document.getElementById('msgInput');
msgInput.addEventListener('input', () => { msgInput.style.height = 'auto'; msgInput.style.height = Math.min(msgInput.scrollHeight, 110) + 'px'; });
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
document.getElementById('sendBtn').onclick = send;

async function send() {
  const h = kstHour();
  if (h >= 22 || h < 7) return;
  const text = msgInput.value.trim();
  const files = pendingFiles.slice();
  if (!text && !files.length) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  try {
    let attachments = [];
    if (files.length) {
      const d = v => String(v||'').replace(/[^0-9]/g,'') || String(v||'').trim();
      const folderName = _safe(`${student.schoolName||''}_${d(student.grade)}${d(student.class)}${d(student.number)}_${student.name}`);
      const stamp = Date.now();
      attachments = await Promise.all(files.map((f, i) => uploadOneFile(f, `정보질문/${folderName}`, _safe(`${stamp}_${i}_${f.name}`))));
    }
    await addDoc(msgsRef, { sender: 'student', text, attachments, createdAt: serverTimestamp() });

    // 알림 on/off만 확인 (텔레그램은 무료·즉시라 5분 제한 없이 매번 발송)
    const threadSnap = await getDoc(threadRef);
    const t = threadSnap.exists() ? threadSnap.data() : {};
    const shouldNotify = t.emailNotify !== false;

    await updateDoc(threadRef, {
      lastMessageAt: serverTimestamp(), unreadByAdmin: true,
      studentName: student.name, schoolName: student.schoolName || '', grade: student.grade || '', class: student.class || '', number: student.number || '',
      ...(shouldNotify ? { lastNotifiedAt: serverTimestamp() } : {}),
    });
    if (shouldNotify) notifyTeacher(text || `(첨부파일 ${attachments.length}개)`);

    msgInput.value = ''; msgInput.style.height = 'auto';
    pendingFiles = []; renderAttachPreview();
  } catch (err) {
    alert('전송 실패: ' + err.message);
  }
  sendBtn.disabled = false;
}
</script>
</body>
</html>
