<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인</title>
  <link rel="icon" href="logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    body { display: flex; flex-direction: column; }
    .nav-brand { display: flex; align-items: center; flex-shrink: 0; }
    .nav-brand img { height: 28px; width: auto; display: block; }
    .nav-end { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .lang-globe { position: relative; flex-shrink: 0; }
    .lang-globe-btn { font-family: inherit; font-size: 1rem; cursor: pointer; border-radius: 50%; width: 34px; height: 34px; border: 1px solid var(--border-card); background: var(--surface); color: var(--text-2); display: flex; align-items: center; justify-content: center; transition: background var(--dur) var(--ease); }
    .lang-globe-btn:hover { background: var(--surface-2); color: var(--text); }
    .lang-globe-dd { position: absolute; top: calc(100% + 8px); right: 0; background: var(--glass-strong); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border-card); border-radius: var(--radius-sm); box-shadow: var(--shadow-md); overflow: hidden; min-width: 120px; z-index: 400; }
    .lang-globe-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--text); }
    .lang-globe-item:hover { background: var(--accent-light); }
    .lang-globe-item .check { color: var(--accent); }

    .wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 20px; }
    .login-card { background: var(--surface); border: 1px solid var(--border-card); border-radius: var(--radius-lg); padding: 40px 34px; width: 100%; max-width: 400px; box-shadow: var(--shadow-md); }
    @media(max-width:480px){ .login-card { padding: 28px 20px; border-radius: var(--radius); } }
    .login-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .login-sub { font-size: 0.95rem; color: var(--text-2); margin-bottom: 26px; }
    .field { margin-bottom: 14px; }
    .field > label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { width: 100%; margin-top: 8px; padding: 13px 24px; font-size: 1rem; }
    .err { color: var(--danger); font-size: 0.85rem; margin-top: 10px; min-height: 20px; text-align: center; }
    .redirect-notice { font-size: 0.85rem; color: var(--text-2); text-align: center; margin-top: 16px; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border-card); border-radius: var(--radius-sm); line-height: 1.5; }
    .redirect-notice strong { color: var(--accent); }
  </style>
</head>
<body>
<nav class="nav" onclick="closeLangDD()">
  <div class="nav-brand"><img src="logo.png" alt="OHinfo" style="height:32px;width:auto;display:block;"></div>
  <div class="nav-end">
    <div class="lang-globe" id="langGlobe">
      <button class="lang-globe-btn" onclick="event.stopPropagation();toggleLangDD()" title="언어">🌐</button>
      <div class="lang-globe-dd hidden" id="langGlobeDD" onclick="event.stopPropagation()">
        <div class="lang-globe-item" onclick="setLang('ko')"><span>한국어</span><span class="check" id="lck-ko"></span></div>
        <div class="lang-globe-item" onclick="setLang('zh')"><span>中文</span><span class="check" id="lck-zh"></span></div>
        <div class="lang-globe-item" onclick="setLang('ru')"><span>Рус</span><span class="check" id="lck-ru"></span></div>
        <div class="lang-globe-item" onclick="setLang('en')"><span>English</span><span class="check" id="lck-en"></span></div>
      </div>
    </div>
    <button class="dark-toggle" onclick="toggleDark()" title="다크모드"></button>
  </div>
</nav>

<div class="wrap">
  <div class="login-card">
    <div class="login-title" id="uiTitle">🔐 로그인</div>
    <div class="login-sub" id="uiSub">설문에 참여하려면 로그인하세요</div>

    <div id="redirectNotice" class="redirect-notice hidden">
      <span id="uiNotice">로그인 후 설문 페이지로 이동합니다</span>
    </div>

    <div style="margin-top:16px">
      <div class="field">
        <label id="uiSchoolLbl">학교명</label>
        <select class="inp" id="loginSchool" onchange="onLoginSchoolChange()"><option value="">학교 선택</option></select>
      </div>
      <div class="row-2">
        <div class="field">
          <label id="uiGradeLbl">학년</label>
          <select class="inp" id="loginGrade" onchange="onLoginGradeChange()"><option value="">선택</option></select>
        </div>
        <div class="field">
          <label id="uiClassLbl">반</label>
          <select class="inp" id="loginClass" onchange="onLoginClassChange()"><option value="">선택</option></select>
        </div>
      </div>
      <div class="field">
        <label id="uiNumLbl">번호</label>
        <select class="inp" id="loginNumber"><option value="" id="uiNumOpt">선택</option></select>
      </div>
      <div class="field">
        <label id="uiPwLbl">비밀번호</label>
        <input class="inp" id="loginPw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn accent" id="loginBtn" onclick="doLogin()">로그인</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { saveSession, loadSession } from './session.js';

// ── dark ──
const savedDark = localStorage.getItem('dark');
if (savedDark === '1' || (!savedDark && window.matchMedia('(prefers-color-scheme:dark)').matches)) document.body.classList.add('dark');
window.toggleDark = () => { document.body.classList.toggle('dark'); localStorage.setItem('dark', document.body.classList.contains('dark') ? '1' : '0'); };

// ── i18n ──
const T = {
  ko: { title:'🔐 로그인', sub:'설문에 참여하려면 로그인하세요', notice:'로그인 후 설문 페이지로 이동합니다',
    school:'학교명', schoolPh:'학교 이름 입력', grade:'학년', cls:'반', num:'번호', numOpt:'선택',
    pw:'비밀번호', pwPh:'비밀번호 입력', btn:'로그인',
    gradeOpt: n => n + '학년', clsOpt: n => n + '반',
    errSchool:'학교 이름을 입력하세요.', errNum:'번호를 선택하세요.', errPw:'비밀번호를 입력하세요.',
    errNotFound:'학생 정보를 찾을 수 없습니다.', errNotReg:'아직 등록되지 않은 계정입니다.', errWrongPw:'비밀번호가 맞지 않습니다.',
    loading:'확인 중...', ok:'로그인' },
  zh: { title:'🔐 登录', sub:'请登录以参与问卷', notice:'登录后将跳转至问卷页面',
    school:'学校名', schoolPh:'输入学校名称', grade:'年级', cls:'班', num:'学号', numOpt:'选择',
    pw:'密码', pwPh:'输入密码', btn:'登录',
    gradeOpt: n => n + '年级', clsOpt: n => n + '班',
    errSchool:'请输入学校名称。', errNum:'请选择学号。', errPw:'请输入密码。',
    errNotFound:'未找到学生信息。', errNotReg:'账号尚未注册。', errWrongPw:'密码错误。',
    loading:'验证中...', ok:'登录' },
  ru: { title:'🔐 Вход', sub:'Войдите, чтобы пройти опрос', notice:'После входа вы будете перенаправлены на опрос',
    school:'Школа', schoolPh:'Введите название школы', grade:'Класс', cls:'Группа', num:'Номер', numOpt:'Выбрать',
    pw:'Пароль', pwPh:'Введите пароль', btn:'Войти',
    gradeOpt: n => n + ' кл.', clsOpt: n => n + ' гр.',
    errSchool:'Введите название школы.', errNum:'Выберите номер.', errPw:'Введите пароль.',
    errNotFound:'Ученик не найден.', errNotReg:'Аккаунт не зарегистрирован.', errWrongPw:'Неверный пароль.',
    loading:'Проверка...', ok:'Войти' },
  en: { title:'🔐 Login', sub:'Sign in to participate in the survey', notice:'You will be redirected to the survey after login',
    school:'School', schoolPh:'Enter school name', grade:'Grade', cls:'Class', num:'Number', numOpt:'Select',
    pw:'Password', pwPh:'Enter password', btn:'Login',
    gradeOpt: n => 'Grade ' + n, clsOpt: n => 'Class ' + n,
    errSchool:'Please enter your school name.', errNum:'Please select your number.', errPw:'Please enter your password.',
    errNotFound:'Student not found.', errNotReg:'Account not registered yet.', errWrongPw:'Incorrect password.',
    loading:'Checking...', ok:'Login' },
};

let lang = localStorage.getItem('ohinfo_lang') || 'ko';

function applyLang() {
  const t = T[lang];
  document.getElementById('uiTitle').textContent   = t.title;
  document.getElementById('uiSub').textContent     = t.sub;
  document.getElementById('uiNotice').textContent  = t.notice;
  document.getElementById('uiSchoolLbl').textContent = t.school;
  document.getElementById('loginSchool').placeholder = t.schoolPh;
  document.getElementById('uiGradeLbl').textContent  = t.grade;
  document.getElementById('uiClassLbl').textContent  = t.cls;
  document.getElementById('uiNumLbl').textContent    = t.num;
  document.getElementById('uiPwLbl').textContent     = t.pw;
  document.getElementById('loginPw').placeholder     = t.pwPh;
  document.getElementById('loginBtn').textContent    = t.btn;
  // 데이터 기반 드롭다운 라벨 갱신 (선택값 유지)
  rebuildLoginDropdowns();
  updateLangCheck(lang);
}

function updateLangCheck(l) {
  ['ko','zh','ru','en'].forEach(k => { document.getElementById('lck-' + k).textContent = k === l ? '✓' : ''; });
}

window.setLang = function(l) { lang = l; localStorage.setItem('ohinfo_lang', l); closeLangDD(); applyLang(); };
window.toggleLangDD = () => document.getElementById('langGlobeDD').classList.toggle('hidden');
window.closeLangDD  = () => document.getElementById('langGlobeDD').classList.add('hidden');

// ── 등록 학생 기반 드롭다운 (학교→학년→반→번호 연동) ──
let _students = [];
function _nv(v){ return String(v||'').replace(/학년|년급|학|반|班|кл\./g,'').trim(); }
function _distinct(vals){
  return [...new Set(vals.map(v=>String(v||'').trim()).filter(Boolean))].sort((a,b)=>{
    const na=parseInt(a,10), nb=parseInt(b,10);
    if(!isNaN(na)&&!isNaN(nb)&&na!==nb) return na-nb;
    return a.localeCompare(b,'ko');
  });
}
function _setOpts(sel, values, placeholder, labelFn){
  const cur = sel.value;
  sel.innerHTML = `<option value="">${placeholder}</option>` +
    values.map(v=>`<option value="${String(v).replace(/"/g,'&quot;')}">${labelFn?labelFn(v):v}</option>`).join('');
  sel.value = values.map(String).includes(cur) ? cur : '';
}
function rebuildLoginDropdowns(){
  const t = T[lang];
  const sSel=document.getElementById('loginSchool');
  _setOpts(sSel, _distinct(_students.map(s=>s.schoolName)), t.numOpt || '선택');
  onLoginSchoolChange(true);
}
window.onLoginSchoolChange = (keep) => {
  const t=T[lang]; const school=document.getElementById('loginSchool').value;
  const grades=_distinct(_students.filter(s=>!school||(s.schoolName||'').trim()===school).map(s=>_nv(s.grade)));
  _setOpts(document.getElementById('loginGrade'), grades, t.numOpt||'선택', g=>t.gradeOpt(g));
  onLoginGradeChange(keep);
};
window.onLoginGradeChange = (keep) => {
  const t=T[lang]; const school=document.getElementById('loginSchool').value; const grade=document.getElementById('loginGrade').value;
  const classes=_distinct(_students.filter(s=>(!school||(s.schoolName||'').trim()===school)&&(!grade||_nv(s.grade)===_nv(grade))).map(s=>_nv(s.class)));
  _setOpts(document.getElementById('loginClass'), classes, t.numOpt||'선택', c=>t.clsOpt(c));
  onLoginClassChange(keep);
};
window.onLoginClassChange = () => {
  const t=T[lang]; const school=document.getElementById('loginSchool').value; const grade=document.getElementById('loginGrade').value; const cls=document.getElementById('loginClass').value;
  const nums=_distinct(_students.filter(s=>(!school||(s.schoolName||'').trim()===school)&&(!grade||_nv(s.grade)===_nv(grade))&&(!cls||_nv(s.class)===_nv(cls))).map(s=>String(s.number)));
  _setOpts(document.getElementById('loginNumber'), nums, t.numOpt||'선택');
};
(async function loadStudentsForLogin(){
  try {
    const snap = await getDocs(collection(db,'students'));
    _students = snap.docs.map(d=>d.data());
  } catch(e){ console.error('load students:', e); }
  rebuildLoginDropdowns();
})();

// ── redirect notice ──
const redirectUrl = sessionStorage.getItem('ohinfo_redirect');
if (redirectUrl) document.getElementById('redirectNotice').classList.remove('hidden');

// ── already logged in → redirect ──
if (loadSession()) {
  const dest = sessionStorage.getItem('ohinfo_redirect');
  if (dest) { sessionStorage.removeItem('ohinfo_redirect'); location.href = dest; }
  else { location.href = 'home.html'; }
}

function nv(v) { return String(v || '').replace(/학년|년급|학|반|班|кл\./g,'').trim(); }

window.doLogin = async () => {
  const t = T[lang];
  const schoolName = document.getElementById('loginSchool').value.trim();
  const grade = document.getElementById('loginGrade').value;
  const cls   = document.getElementById('loginClass').value;
  const number = document.getElementById('loginNumber').value;
  const pw    = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');
  errEl.textContent = '';

  if (!schoolName) { errEl.textContent = t.errSchool; return; }
  if (!number)     { errEl.textContent = t.errNum; return; }
  if (!pw)         { errEl.textContent = t.errPw; return; }

  btn.disabled = true;
  btn.textContent = t.loading;
  try {
    const snap = await getDocs(collection(db, 'students'));
    const match = snap.docs.find(d => {
      const s = d.data();
      return s.schoolName === schoolName
        && nv(s.grade) === nv(grade)
        && nv(s.class) === nv(cls)
        && String(s.number) === String(number);
    });
    if (!match) { errEl.textContent = t.errNotFound; btn.disabled = false; btn.textContent = t.ok; return; }
    const data = match.data();
    if (!data.registered) { errEl.textContent = t.errNotReg; btn.disabled = false; btn.textContent = t.ok; return; }
    if (data.password !== pw) { errEl.textContent = t.errWrongPw; document.getElementById('loginPw').value = ''; btn.disabled = false; btn.textContent = t.ok; return; }

    saveSession({ id: match.id, ...data });
    const dest = sessionStorage.getItem('ohinfo_redirect');
    if (dest) { sessionStorage.removeItem('ohinfo_redirect'); location.href = dest; }
    else { location.href = 'home.html'; }
  } catch(e) {
    errEl.textContent = '오류: ' + e.message;
    btn.disabled = false; btn.textContent = t.ok;
  }
};

applyLang();
</script>
</body>
</html>
