<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>정산 관리 — OHweb</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="theme.css">
  <script src="admin-auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); line-height: 1.6; }
    .hidden { display: none !important; }

    .nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--glass-nav); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(255,255,255,0.35), var(--shadow);
      padding: 0 20px; height: var(--nav-h);
      display: flex; align-items: center; gap: 12px;
    }
    .nav-brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; text-decoration: none; }
    .nav-brand img { height: 30px; width: auto; display: block; }
    .waffle-btn {
      width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border-card);
      background: var(--glass); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--highlight); transition: background 0.2s; flex-shrink: 0; margin-left: auto;
    }
    .waffle-btn:hover { background: var(--glass-strong); }
    .app-modal { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(20,22,40,0.45); align-items: center; justify-content: center; }
    .app-modal.open { display: flex; }
    .app-modal-card { background: #ffffff; border-radius: 22px; padding: 24px; width: min(460px, 92vw); box-shadow: 0 24px 70px rgba(0,0,0,0.3); }
    body.dark .app-modal-card { background: #1a1d2e; }
    .app-modal-head { display: flex; align-items: center; justify-content: space-between; font-size: 1.05rem; font-weight: 900; color: var(--text); margin-bottom: 18px; }
    .app-modal-x { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--sub); line-height: 1; }
    .app-modal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .app-modal-item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 8px; border-radius: 16px; cursor: pointer; background: #f4f5fa; border: 1px solid var(--border-card); font-family: inherit; font-size: 0.85rem; font-weight: 700; color: var(--text); transition: background 0.15s, transform 0.1s; }
    body.dark .app-modal-item { background: rgba(255,255,255,0.06); }
    .app-modal-item:hover { background: #e8eaf3; transform: translateY(-2px); }
    body.dark .app-modal-item:hover { background: rgba(255,255,255,0.12); }
    .app-modal-icon { font-size: 2rem; line-height: 1; }
    .dark-toggle {
      width: 42px; height: 24px; border-radius: 50px;
      background: var(--glass); border: 1px solid var(--border);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--highlight); cursor: pointer; position: relative; transition: 0.3s; flex-shrink: 0;
    }
    body.dark .dark-toggle { background: rgba(42,92,230,0.6); border-color: rgba(100,140,255,0.4); }
    .dark-toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: transform 0.3s;
    }
    body.dark .dark-toggle::after { transform: translateX(18px); }

    .wrap { max-width: 880px; margin: 0 auto; padding: 32px 20px 80px; }
    @media (max-width: 600px) { .wrap { padding: 18px 14px 80px; } }
    .page-head { margin-bottom: 20px; }
    .page-head h1 { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.03em; }
    .page-head p { font-size: 0.85rem; color: var(--sub); margin-top: 2px; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
    @media (max-width: 560px) { .stats-row { grid-template-columns: 1fr 1fr; } }
    .stat-card { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border-card); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--highlight), var(--shadow); }
    .stat-label { font-size: 0.68rem; font-weight: 700; color: var(--sub); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-size: 1.5rem; font-weight: 900; line-height: 1; letter-spacing: -0.03em; }
    .stat-value span { font-size: 0.85rem; font-weight: 600; color: var(--sub); margin-left: 3px; }

    .seg { display: inline-flex; background: var(--glass); border: 1px solid var(--border-card); border-radius: 50px; padding: 3px; box-shadow: var(--highlight); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); margin-bottom: 16px; }
    .seg button { font-family: inherit; font-size: 0.8rem; font-weight: 700; color: var(--sub); border: none; background: none; cursor: pointer; padding: 6px 16px; border-radius: 50px; transition: 0.2s; white-space: nowrap; }
    .seg button.on { background: var(--accent); color: #fff; }

    .icon-action {
      width: 32px; height: 32px; border-radius: 50%; border: none; background: none; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; color: var(--sub); flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }
    .icon-action:hover { background: var(--glass); color: var(--text); }
    .icon-action.danger { color: #ef4444; }
    .icon-action.danger:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

    .trip-item { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border-card); border-radius: var(--radius-sm); padding: 16px 18px; margin-bottom: 10px; }
    .trip-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .trip-name { font-weight: 800; font-size: 0.98rem; }
    .badge { font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 50px; white-space: nowrap; }
    .badge.pending { background: rgba(245,158,11,0.15); color: #b45309; }
    .badge.approved { background: rgba(34,197,94,0.15); color: #15803d; }
    body.dark .badge.approved { color: #4ade80; }
    .badge.done { background: rgba(120,120,120,0.15); color: var(--sub); }
    .trip-meta { font-size: 0.78rem; color: var(--sub); line-height: 1.8; margin-bottom: 10px; }
    .trip-meta code { font-family: monospace; background: var(--glass-strong); padding: 1px 6px; border-radius: 5px; }
    .trip-actions { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--sub); font-size: 0.9rem; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(20,24,40,0.9); color: #fff; font-size: 0.85rem; font-weight: 600; padding: 10px 22px; border-radius: 50px; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.35); backdrop-filter: blur(12px); transition: transform 0.3s ease, opacity 0.3s ease; opacity: 0; pointer-events: none; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .modal-bg { position: fixed; inset: 0; background: rgba(20,22,30,0.5); display: flex; align-items: center; justify-content: center; z-index: 9000; padding: 20px; }
    .modal-bg.hidden { display: none; }
    .modal { background: var(--bg-elevated); border-radius: var(--radius); padding: 24px 22px; width: 100%; max-width: 380px; box-shadow: var(--shadow-md); }
    .modal-title { font-size: 1.02rem; font-weight: 800; margin-bottom: 14px; }
    .inp { width: 100%; padding: 10px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border-card); background: var(--glass); color: var(--text); font-family: inherit; font-size: 0.92rem; outline: none; margin-bottom: 10px; }
    .btn { font-family: inherit; font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 50px; padding: 9px 16px; border: 1px solid var(--border); background: var(--glass); color: var(--text); width: 100%; }
    .btn.accent { background: var(--accent-grad); color: #fff; border: none; }
  </style>
</head>

<script type="module">
if (!window.AdminAuth.isValid()) { window.location.href = 'index.html'; }
import { settleDb as db } from './settle-firebase-config.js';
import {
  collection, getDocs, doc, updateDoc, deleteDoc
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

let trips = [];
let filter = 'all';
let editId = null;

function escHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n) { return '₩' + Math.round(Number(n)||0).toLocaleString('ko-KR'); }
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2400);
}
window.closeM = (id) => document.getElementById(id).classList.add('hidden');

async function loadAll() {
  const el = document.getElementById('tripList');
  el.innerHTML = '<div class="empty-state">불러오는 중…</div>';
  try {
    const [tripSnap, expenseCounts] = await Promise.all([
      getDocs(collection(db, 'settle_trips')),
      (async () => {
        // 전체 지출 합계는 프로젝트별 서브컬렉션을 순회
        return null;
      })(),
    ]);
    trips = tripSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    let totalExpense = 0;
    await Promise.all(trips.map(async t => {
      const expSnap = await getDocs(collection(db, 'settle_trips', t.id, 'expenses'));
      t._expenseSum = expSnap.docs.reduce((s, d) => s + (Number(d.data().amount) || 0), 0);
      totalExpense += t._expenseSum;
    }));

    document.getElementById('statTotal').innerHTML = `${trips.length}<span>개</span>`;
    document.getElementById('statPending').innerHTML = `${trips.filter(t=>t.status==='pending').length}<span>개</span>`;
    document.getElementById('statExpense').innerHTML = fmt(totalExpense);

    render();
  } catch (e) {
    el.innerHTML = `<div class="empty-state">불러오기 실패: ${escHtml(e.message)}</div>`;
  }
}

window.setFilter = (f) => {
  filter = f;
  document.querySelectorAll('#filterSeg button').forEach(b => b.classList.toggle('on', b.dataset.f === f));
  render();
};

function statusBadge(s) {
  if (s === 'approved') return '<span class="badge approved">승인됨</span>';
  if (s === 'done') return '<span class="badge done">완료</span>';
  return '<span class="badge pending">대기</span>';
}

function render() {
  const list = filter === 'all' ? trips : trips.filter(t => t.status === filter);
  const el = document.getElementById('tripList');
  if (!list.length) { el.innerHTML = '<div class="empty-state">해당하는 프로젝트가 없습니다.</div>'; return; }
  el.innerHTML = list.map(t => {
    const members = Array.isArray(t.members) ? t.members.join(', ') : (t.members || '');
    let approveBtn = '';
    if (t.status === 'pending') approveBtn = `<button class="icon-action" title="승인" data-action="approve" data-id="${t.id}"><svg width="17" height="17"><use href="#ic-check"/></svg></button>`;
    else if (t.status === 'approved') approveBtn = `<button class="icon-action" title="승인 취소" data-action="revoke" data-id="${t.id}"><svg width="17" height="17"><use href="#ic-undo"/></svg></button>`;
    return `<div class="trip-item">
      <div class="trip-top"><span class="trip-name">${escHtml(t.name)}</span>${statusBadge(t.status)}</div>
      <div class="trip-meta">
        참여자: ${escHtml(members) || '—'}<br>
        비밀코드: <code>${escHtml(t.code)}</code> · 누적 지출 ${fmt(t._expenseSum)}
        ${t.memo ? '<br>메모: ' + escHtml(t.memo) : ''}
      </div>
      <div class="trip-actions">
        ${approveBtn}
        <button class="icon-action" title="코드 변경" data-action="resetCode" data-id="${t.id}"><svg width="17" height="17"><use href="#ic-key"/></svg></button>
        <button class="icon-action" title="참여자 수정" data-action="editMembers" data-id="${t.id}" data-val="${escHtml(members)}"><svg width="17" height="17"><use href="#ic-people"/></svg></button>
        <button class="icon-action" title="메모" data-action="editMemo" data-id="${t.id}" data-val="${escHtml(t.memo||'')}"><svg width="17" height="17"><use href="#ic-doc"/></svg></button>
        <button class="icon-action danger" title="삭제" data-action="delete" data-id="${t.id}" data-name="${escHtml(t.name)}"><svg width="17" height="17"><use href="#ic-trash"/></svg></button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('tripList').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  if (action === 'approve') {
    await updateDoc(doc(db, 'settle_trips', id), { status: 'approved' });
    showToast('승인되었습니다.'); loadAll();
  } else if (action === 'revoke') {
    if (!confirm('승인을 취소하시겠습니까?')) return;
    await updateDoc(doc(db, 'settle_trips', id), { status: 'pending' });
    showToast('승인이 취소되었습니다.'); loadAll();
  } else if (action === 'resetCode') {
    editId = id; document.getElementById('mReset').value = '';
    document.getElementById('modal-reset').classList.remove('hidden');
  } else if (action === 'editMembers') {
    editId = id; document.getElementById('mMembers').value = btn.dataset.val || '';
    document.getElementById('modal-members').classList.remove('hidden');
  } else if (action === 'editMemo') {
    editId = id; document.getElementById('mMemo').value = btn.dataset.val || '';
    document.getElementById('modal-memo').classList.remove('hidden');
  } else if (action === 'delete') {
    const name = btn.dataset.name;
    if (!confirm(`"${name}" 프로젝트를 완전히 삭제합니다.\n지출·송금 데이터도 함께 삭제됩니다.\n계속하시겠습니까?`)) return;
    try {
      const [expSnap, trSnap] = await Promise.all([
        getDocs(collection(db, 'settle_trips', id, 'expenses')),
        getDocs(collection(db, 'settle_trips', id, 'transfers')),
      ]);
      await Promise.all([
        ...expSnap.docs.map(d => deleteDoc(d.ref)),
        ...trSnap.docs.map(d => deleteDoc(d.ref)),
      ]);
      await deleteDoc(doc(db, 'settle_trips', id));
      showToast('삭제되었습니다.'); loadAll();
    } catch (err) { showToast('삭제 실패: ' + err.message); }
  }
});

window.doReset = async () => {
  const v = document.getElementById('mReset').value.trim();
  if (!v) { showToast('새 코드를 입력해주세요.'); return; }
  await updateDoc(doc(db, 'settle_trips', editId), { code: v });
  showToast('코드가 변경되었습니다.'); closeM('modal-reset'); loadAll();
};
window.doMembers = async () => {
  const v = document.getElementById('mMembers').value.trim();
  if (!v) { showToast('참여자를 입력해주세요.'); return; }
  const members = v.split(',').map(m => m.trim()).filter(Boolean);
  await updateDoc(doc(db, 'settle_trips', editId), { members });
  showToast('저장되었습니다.'); closeM('modal-members'); loadAll();
};
window.doMemo = async () => {
  const v = document.getElementById('mMemo').value;
  await updateDoc(doc(db, 'settle_trips', editId), { memo: v });
  showToast('저장되었습니다.'); closeM('modal-memo'); loadAll();
};

loadAll();
</script>

<script>
function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('dark', isDark ? '1' : '0');
}
function openAppModal() { document.getElementById('appModal').classList.add('open'); }
function closeAppModal() { document.getElementById('appModal').classList.remove('open'); }
(function(){ if (localStorage.getItem('dark') === '1') document.body.classList.add('dark'); })();
</script>
</body>
