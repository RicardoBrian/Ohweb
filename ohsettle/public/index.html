<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>OHsettle — 정산 매니저</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="theme.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); line-height: 1.6; }
  .hidden { display: none !important; }

  .nav {
    justify-content: space-between;
  }
  .nav-brand { font-weight: 800; font-size: 1.02rem; letter-spacing: -0.02em; }
  .icon-action {
    width: 34px; height: 34px; border-radius: 50%; border: none; background: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; color: var(--sub); flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .icon-action:hover { background: var(--glass); color: var(--text); }
  .icon-action.danger { color: var(--danger); }
  .icon-action.danger:hover { background: var(--danger-light); }

  .page { display: none; }
  .page.active { display: block; }
  .wrap { max-width: 520px; margin: 0 auto; padding: 28px 18px 80px; }

  .hero { text-align: center; padding: 20px 0 30px; }
  .hero-logo { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; }
  .hero-desc { font-size: 0.85rem; color: var(--sub); margin-top: 8px; line-height: 1.6; }

  .label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-3); margin-bottom: 8px; display: block; }
  .field { margin-bottom: 12px; }

  .card { background: var(--glass-strong); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; }
  .card-title { font-size: 0.98rem; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  .tabs { display: flex; background: var(--glass); border: 1px solid var(--border-card); border-radius: 50px; padding: 4px; margin-bottom: 18px; gap: 2px; }
  .tab { flex: 1; padding: 9px; text-align: center; font-size: 0.82rem; font-weight: 700; color: var(--sub); border-radius: 50px; cursor: pointer; transition: 0.15s; }
  .tab.active { background: var(--accent); color: #fff; }

  .member-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--hairline); }
  .member-row:last-child { border-bottom: none; }
  .member-label { display: flex; align-items: center; gap: 10px; font-size: 0.95rem; cursor: pointer; }
  .member-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .custom-amt { width: 110px !important; padding: 7px 10px !important; text-align: right; font-variant-numeric: tabular-nums; display: none; }

  .flex-row { display: flex; gap: 8px; align-items: center; }
  .flex-row .inp { flex: 1; }
  .flex-row select.inp { flex: 1; }

  .list-item { background: var(--glass); border: 1px solid var(--border-card); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px; position: relative; }
  .list-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; gap: 8px; }
  .list-name { font-weight: 700; font-size: 0.92rem; display: flex; align-items: center; gap: 6px; color: var(--text); }
  .list-name .list-type-icon { color: var(--sub); flex-shrink: 0; }
  .list-amount { font-variant-numeric: tabular-nums; font-size: 0.92rem; font-weight: 700; }
  .list-meta { font-size: 0.76rem; color: var(--sub); line-height: 1.6; padding-right: 30px; }
  .list-del { position: absolute; right: 10px; bottom: 10px; }

  .badge { font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 50px; background: var(--glass); color: var(--sub); }

  .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 18px; }
  .stat-card { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--border-card); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--highlight), var(--shadow); }
  .stat-label { font-size: 0.68rem; font-weight: 700; color: var(--sub); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-size: 1.3rem; font-weight: 900; line-height: 1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }

  .balance-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--hairline); font-size: 0.88rem; }
  .balance-row:last-child { border-bottom: none; }
  .balance-pos { color: var(--success); font-variant-numeric: tabular-nums; font-weight: 700; }
  .balance-neg { color: var(--danger); font-variant-numeric: tabular-nums; font-weight: 700; }
  .balance-zero { color: var(--sub); font-variant-numeric: tabular-nums; }

  .result-box { font-family: 'SF Mono', Consolas, monospace; font-size: 0.82rem; background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border-card); padding: 18px; border-radius: var(--radius-sm); white-space: pre-wrap; line-height: 1.7; margin-top: 14px; }
  body.dark .result-box { background: #0d0e14; }

  .spinner { width: 20px; height: 20px; border: 2px solid var(--border-card); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 30px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-bg { position: fixed; inset: 0; background: rgba(20,22,30,0.5); display: flex; align-items: center; justify-content: center; z-index: 900; padding: 20px; }
  .modal { background: var(--bg-elevated); border-radius: var(--radius); padding: 26px 22px; width: 100%; max-width: 380px; box-shadow: var(--shadow-lg); }
  .modal-title { font-size: 1.05rem; font-weight: 800; margin-bottom: 14px; }

  .text-center { text-align: center; }
  .text-sm { font-size: 0.8rem; color: var(--sub); }
  .mt8 { margin-top: 8px; } .mt16 { margin-top: 16px; } .mt24 { margin-top: 24px; }
  .divider { border: none; border-top: 1px solid var(--hairline); margin: 18px 0; }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;">
  <defs>
    <symbol id="ic-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-wallet" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h14a3 3 0 0 1 3 3v0" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="16.5" cy="13" r="1.3" fill="currentColor"/></symbol>
    <symbol id="ic-swap" viewBox="0 0 24 24"><path d="M4 8h13M17 8l-3.5-3.5M17 8l-3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 16H7M7 16l3.5-3.5M7 16l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-chart" viewBox="0 0 24 24"><line x1="6" y1="19" x2="6" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="18" y1="19" x2="18" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
    <symbol id="ic-download" viewBox="0 0 24 24"><line x1="12" y1="4" x2="12" y2="15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><polyline points="7,10 12,15 17,10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><line x1="5" y1="19" x2="19" y2="19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
    <symbol id="ic-trash" viewBox="0 0 24 24"><line x1="5" y1="7" x2="19" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M8 7V5a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M7 7l1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><line x1="10" y1="11" x2="10" y2="17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="14" y1="11" x2="14" y2="17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></symbol>
    <symbol id="ic-refresh" viewBox="0 0 24 24"><path d="M5 12a7 7 0 0 1 12-4.9M19 12a7 7 0 0 1-12 4.9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><polyline points="17,3 17,7.5 12.5,7.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><polyline points="7,21 7,16.5 11.5,16.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-close" viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
    <symbol id="ic-exit" viewBox="0 0 24 24"><path d="M9 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 8l4 4-4 4M19 12H9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="ic-doc" viewBox="0 0 24 24"><path d="M7 3.5h7l4 4v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4.5a1 1 0 0 1 1-1Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M14 3.5V8h4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><line x1="8.5" y1="13" x2="15.5" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="8.5" y1="16.5" x2="13" y2="16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></symbol>
  </defs>
</svg>

<div id="toast" class="toast"></div>

<nav class="nav">
  <span class="nav-brand">OHsettle</span>
  <div class="dark-toggle" onclick="toggleDark()" title="다크모드"></div>
</nav>

<!-- 홈: 로그인 / 등록 -->
<div id="page-home" class="page active">
  <div class="wrap">
    <div class="hero">
      <div class="hero-logo">정산 매니저</div>
      <p class="hero-desc">모임 지출을 함께 기록하고<br>깔끔하게 정산하세요</p>
    </div>

    <div class="card">
      <div class="card-title"><svg width="18" height="18"><use href="#ic-swap"/></svg>기존 프로젝트 입장</div>
      <div class="field"><select class="inp" id="tripSelect"><option value="">프로젝트를 선택하세요</option></select></div>
      <div class="field"><input class="inp" type="password" id="loginCode" placeholder="비밀코드 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn" style="width:100%;" onclick="doLogin()">입장하기</button>
    </div>

    <div class="card">
      <div class="card-title"><svg width="18" height="18"><use href="#ic-plus"/></svg>새 프로젝트 등록</div>
      <div class="field"><input class="inp" type="text" id="regName" placeholder="프로젝트 이름 (예: 제주 여행)"></div>
      <div class="field"><input class="inp" type="password" id="regCode" placeholder="비밀코드 설정"></div>
      <div class="field"><input class="inp" type="text" id="regMembers" placeholder="참여자 (쉼표로 구분, 예: 철수, 영희, 민수)"></div>
      <button class="btn" style="width:100%;" onclick="doRegister()">등록 신청</button>
      <p class="text-sm text-center mt8">등록 후 관리자 승인이 필요합니다</p>
    </div>
  </div>
</div>

<!-- 메인: 대시보드 -->
<div id="page-main" class="page">
  <nav class="nav">
    <div>
      <div class="nav-brand" id="mainTitle" style="font-size:0.95rem;">프로젝트명</div>
      <div class="text-sm" id="mainMemberCount" style="margin-top:1px;"></div>
    </div>
    <button class="icon-action" title="나가기" onclick="location.reload()"><svg width="18" height="18"><use href="#ic-exit"/></svg></button>
  </nav>

  <div class="wrap">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">총 지출</div><div class="stat-value" id="summaryTotal">₩0</div></div>
      <div class="stat-card"><div class="stat-label">참여자</div><div class="stat-value" id="summaryMembers">0<span style="font-size:0.75rem;font-weight:600;color:var(--sub);margin-left:2px;">명</span></div></div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-expense" onclick="switchTab('expense')">지출 추가</div>
      <div class="tab" id="tab-transfer" onclick="switchTab('transfer')">송금 기록</div>
      <div class="tab" id="tab-stats" onclick="switchTab('stats')">현황</div>
    </div>

    <div id="view-expense">
      <div class="card">
        <div class="card-title"><svg width="18" height="18"><use href="#ic-wallet"/></svg>지출 입력</div>
        <div class="field"><span class="label">날짜</span><input class="inp" type="date" id="date_e"></div>
        <div class="field"><span class="label">내용</span><input class="inp" type="text" id="desc_e" placeholder="예: 저녁 식사"></div>
        <div class="flex-row field">
          <div style="flex:1"><span class="label">금액</span><input class="inp" type="number" id="amt_e" placeholder="0" style="text-align:right;font-variant-numeric:tabular-nums;"></div>
          <div style="flex:1"><span class="label">결제자</span><select class="inp" id="payer_e"></select></div>
        </div>
        <hr class="divider">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span class="label" style="margin:0;">참여자 선택</span>
          <label style="display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text-2);cursor:pointer;">
            <input type="checkbox" id="splitToggle" onchange="toggleSplit()" style="accent-color:var(--accent);">금액 직접 입력
          </label>
        </div>
        <div id="memberList"></div>
        <button class="btn mt16" style="width:100%;" onclick="addExpense()">지출 추가</button>
      </div>
    </div>

    <div id="view-transfer" class="hidden">
      <div class="card">
        <div class="card-title"><svg width="18" height="18"><use href="#ic-swap"/></svg>중간 송금 기록</div>
        <p class="text-sm mt8" style="margin-bottom:14px;">정산 전 미리 보낸 금액을 기록하면 최종 계산에 반영됩니다.</p>
        <div class="field"><span class="label">날짜</span><input class="inp" type="date" id="date_t"></div>
        <div class="flex-row field">
          <select class="inp" id="sender_t"></select>
          <svg width="16" height="16" style="color:var(--text-3);flex-shrink:0;"><use href="#ic-swap"/></svg>
          <select class="inp" id="receiver_t"></select>
        </div>
        <div class="field"><span class="label">금액</span><input class="inp" type="number" id="amt_t" placeholder="0" style="font-variant-numeric:tabular-nums;"></div>
        <div class="field"><span class="label">메모 (선택)</span><input class="inp" type="text" id="memo_t" placeholder="메모"></div>
        <button class="btn" style="width:100%;" onclick="addTransfer()">송금 기록 저장</button>
      </div>
    </div>

    <div id="view-stats" class="hidden">
      <div class="card">
        <div class="card-title"><svg width="18" height="18"><use href="#ic-chart"/></svg>참여자별 현황</div>
        <div id="memberBalanceList"></div>
      </div>
      <div class="card">
        <div class="card-title">정산 결과</div>
        <p class="text-sm" style="margin-bottom:12px;">모든 지출과 송금을 반영한 최종 송금 요청입니다.</p>
        <button class="btn" style="width:100%;" onclick="showSettlement()">정산 계산하기</button>
        <div id="resultArea" class="hidden"></div>
      </div>
    </div>

    <div id="historySection">
      <div style="display:flex;justify-content:space-between;align-items:center;margin:22px 0 10px;">
        <span style="font-weight:800;font-size:0.95rem;">최근 내역</span>
        <button class="icon-action" title="새로고침" onclick="refreshData()"><svg width="17" height="17"><use href="#ic-refresh"/></svg></button>
      </div>
      <div id="dataList"><div class="spinner"></div></div>
    </div>

    <div class="card mt24">
      <div class="card-title" style="justify-content:space-between;">
        관리
        <div style="display:flex;gap:2px;">
          <button class="icon-action" title="CSV 내보내기" onclick="downloadCSV()"><svg width="18" height="18"><use href="#ic-download"/></svg></button>
          <button class="icon-action danger" title="데이터 삭제 및 종료" onclick="deleteData()"><svg width="18" height="18"><use href="#ic-trash"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import {
  collection, addDoc, getDocs, getDoc, doc, deleteDoc, updateDoc, query, where, orderBy, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

let currentTripId = '', currentTripName = '', currentCode = '';
let tripMembers = [];
let allDataCache = { expenses: [], transfers: [] };

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2600);
}
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function fmt(n) { return '₩' + Math.round(Number(n) || 0).toLocaleString('ko-KR'); }
function today() { return new Date().toISOString().substring(0, 10); }
function escHtml(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.toggleDark = () => { document.body.classList.toggle('dark'); localStorage.setItem('dark', document.body.classList.contains('dark') ? '1' : '0'); };
if (localStorage.getItem('dark') === '1') document.body.classList.add('dark');

// ── 초기 로드 ──
document.getElementById('date_e').value = today();
document.getElementById('date_t').value = today();
loadTrips();

async function loadTrips() {
  const snap = await getDocs(collection(db, 'settle_trips'));
  const sel = document.getElementById('tripSelect');
  sel.innerHTML = '<option value="">프로젝트를 선택하세요</option>';
  snap.docs.forEach(d => {
    const data = d.data();
    if (data.status === 'done') return;
    const o = document.createElement('option');
    o.value = d.id;
    o.textContent = data.status === 'pending' ? `${data.name} (승인 대기)` : data.name;
    sel.appendChild(o);
  });
}

// ── 등록 ──
window.doRegister = async () => {
  const name = document.getElementById('regName').value.trim();
  const code = document.getElementById('regCode').value.trim();
  const membersRaw = document.getElementById('regMembers').value.trim();
  if (!name || !code || !membersRaw) { toast('모든 항목을 입력해주세요.'); return; }
  const members = membersRaw.split(',').map(m => m.trim()).filter(Boolean);
  try {
    const dupSnap = await getDocs(query(collection(db, 'settle_trips'), where('name', '==', name)));
    if (!dupSnap.empty) { toast('이미 존재하는 프로젝트 이름입니다.'); return; }
    await addDoc(collection(db, 'settle_trips'), { name, code, status: 'pending', members, memo: '', createdAt: serverTimestamp() });
    toast('등록 신청이 완료되었습니다. 관리자 승인 후 이용 가능합니다.');
    document.getElementById('regName').value = '';
    document.getElementById('regCode').value = '';
    document.getElementById('regMembers').value = '';
  } catch (e) { toast('오류: ' + e.message); }
};

// ── 로그인 ──
window.doLogin = async () => {
  const tripId = document.getElementById('tripSelect').value;
  const code = document.getElementById('loginCode').value.trim();
  if (!tripId) { toast('프로젝트를 선택해주세요.'); return; }
  if (!code) { toast('비밀코드를 입력해주세요.'); return; }
  try {
    const snap = await getDoc(doc(db, 'settle_trips', tripId));
    if (!snap.exists() || snap.data().code !== code) { toast('인증 실패. 비밀코드를 확인해주세요.'); return; }
    const data = snap.data();
    if (data.status !== 'approved') { toast('아직 승인 대기 중입니다.'); return; }
    currentTripId = tripId; currentTripName = data.name; currentCode = code;
    tripMembers = Array.isArray(data.members) ? data.members : String(data.members || '').split(',').map(m => m.trim()).filter(Boolean);
    document.getElementById('mainTitle').textContent = data.name;
    document.getElementById('mainMemberCount').textContent = `참여자 ${tripMembers.length}명`;
    showPage('page-main');
    initUI();
    refreshData();
  } catch (e) { toast('오류: ' + e.message); }
};

// ── 메인 UI 초기화 ──
function initUI() {
  ['payer_e', 'sender_t', 'receiver_t'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    tripMembers.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; el.appendChild(o); });
  });
  const ml = document.getElementById('memberList');
  ml.innerHTML = tripMembers.map((m, i) => `
    <div class="member-row">
      <label class="member-label"><input type="checkbox" class="mem-chk" value="${escHtml(m)}" checked>${escHtml(m)}</label>
      <input type="number" id="amt_${i}" class="inp custom-amt" placeholder="0">
    </div>`).join('');
}

window.switchTab = (mode) => {
  ['expense','transfer','stats'].forEach(t => {
    document.getElementById('view-'+t).classList.add('hidden');
    document.getElementById('tab-'+t).classList.remove('active');
  });
  document.getElementById('view-'+mode).classList.remove('hidden');
  document.getElementById('tab-'+mode).classList.add('active');
  if (mode === 'stats') refreshStats();
};

window.toggleSplit = () => {
  const on = document.getElementById('splitToggle').checked;
  document.querySelectorAll('.custom-amt').forEach(el => { el.style.display = on ? 'block' : 'none'; });
};

// ── 지출 추가 ──
window.addExpense = async () => {
  const date = document.getElementById('date_e').value;
  const desc = document.getElementById('desc_e').value.trim();
  const amt = document.getElementById('amt_e').value;
  const payer = document.getElementById('payer_e').value;
  if (!desc || !amt) { toast('내용과 금액을 입력해주세요.'); return; }

  let memberData = '';
  if (document.getElementById('splitToggle').checked) {
    const pairs = []; let sum = 0;
    document.querySelectorAll('.mem-chk').forEach((c, i) => {
      if (c.checked) {
        const val = Number(document.getElementById('amt_'+i).value);
        if (val > 0) { pairs.push(`${c.value}:${val}`); sum += val; }
      }
    });
    if (Math.abs(sum - Number(amt)) > 1) {
      if (!confirm(`총액(${fmt(amt)})과 입력 합계(${fmt(sum)})가 다릅니다.\n그래도 저장하시겠습니까?`)) return;
    }
    memberData = pairs.join(',');
  } else {
    const checked = [...document.querySelectorAll('.mem-chk:checked')].map(el => el.value);
    if (!checked.length) { toast('참여자를 한 명 이상 선택해주세요.'); return; }
    memberData = checked.join(',');
  }

  try {
    await addDoc(collection(db, 'settle_trips', currentTripId, 'expenses'), { date, desc, amount: Number(amt), payer, memberData, createdAt: serverTimestamp() });
    toast('저장되었습니다.');
    document.getElementById('desc_e').value = '';
    document.getElementById('amt_e').value = '';
    refreshData();
  } catch (e) { toast('오류: ' + e.message); }
};

// ── 송금 기록 ──
window.addTransfer = async () => {
  const date = document.getElementById('date_t').value;
  const sender = document.getElementById('sender_t').value;
  const receiver = document.getElementById('receiver_t').value;
  const amt = document.getElementById('amt_t').value;
  const memo = document.getElementById('memo_t').value.trim();
  if (sender === receiver) { toast('보낸 사람과 받은 사람이 같습니다.'); return; }
  if (!amt) { toast('금액을 입력해주세요.'); return; }
  try {
    await addDoc(collection(db, 'settle_trips', currentTripId, 'transfers'), { date, sender, receiver, amount: Number(amt), memo, createdAt: serverTimestamp() });
    toast('송금 내역이 기록되었습니다.');
    document.getElementById('amt_t').value = '';
    document.getElementById('memo_t').value = '';
    refreshData();
  } catch (e) { toast('오류: ' + e.message); }
};

// ── 내역 조회/표시 ──
async function fetchTripData() {
  const [expSnap, trSnap] = await Promise.all([
    getDocs(collection(db, 'settle_trips', currentTripId, 'expenses')),
    getDocs(collection(db, 'settle_trips', currentTripId, 'transfers')),
  ]);
  return {
    expenses: expSnap.docs.map(d => ({ id: d.id, ...d.data() })),
    transfers: trSnap.docs.map(d => ({ id: d.id, ...d.data() })),
  };
}

window.refreshData = async () => {
  document.getElementById('dataList').innerHTML = '<div class="spinner"></div>';
  try {
    allDataCache = await fetchTripData();
    updateSummaryBar();
    renderList();
  } catch (e) { document.getElementById('dataList').innerHTML = `<p class="text-sm text-center" style="padding:20px 0;">불러오기 실패: ${escHtml(e.message)}</p>`; }
};

function updateSummaryBar() {
  const total = allDataCache.expenses.reduce((s, e) => s + Number(e.amount), 0);
  document.getElementById('summaryTotal').textContent = fmt(total);
  document.getElementById('summaryMembers').innerHTML = `${tripMembers.length}<span style="font-size:0.75rem;font-weight:600;color:var(--sub);margin-left:2px;">명</span>`;
}

function renderList() {
  const list = document.getElementById('dataList');
  const combined = [
    ...allDataCache.expenses.map(e => ({ ...e, type: 'expense' })),
    ...allDataCache.transfers.map(t => ({ ...t, type: 'transfer' })),
  ].sort((a, b) => b.date.localeCompare(a.date));

  if (!combined.length) { list.innerHTML = '<p class="text-sm text-center" style="padding:24px 0;">등록된 내역이 없습니다.</p>'; return; }

  list.innerHTML = combined.map(item => {
    if (item.type === 'expense') {
      const mem = item.memberData.includes(':') ? '(개별) ' + escHtml(item.memberData) : escHtml(item.memberData);
      return `<div class="list-item expense">
        <div class="list-top"><span class="list-name"><svg width="14" height="14" class="list-type-icon"><use href="#ic-wallet"/></svg>${escHtml(item.desc)}</span><span class="list-amount">${fmt(item.amount)}</span></div>
        <div class="list-meta">${item.date} · ${escHtml(item.payer)} 결제<br>참여: ${mem}</div>
        <button class="icon-action danger list-del" title="삭제" data-type="expense" data-id="${item.id}"><svg width="15" height="15"><use href="#ic-trash"/></svg></button>
      </div>`;
    }
    return `<div class="list-item transfer">
      <div class="list-top"><span class="list-name"><svg width="14" height="14" class="list-type-icon"><use href="#ic-swap"/></svg>송금</span><span class="list-amount">${fmt(item.amount)}</span></div>
      <div class="list-meta">${item.date}<br>${escHtml(item.sender)} → ${escHtml(item.receiver)}${item.memo ? ' · ' + escHtml(item.memo) : ''}</div>
      <button class="icon-action danger list-del" title="삭제" data-type="transfer" data-id="${item.id}"><svg width="15" height="15"><use href="#ic-trash"/></svg></button>
    </div>`;
  }).join('');
}

document.getElementById('dataList').addEventListener('click', async (e) => {
  const btn = e.target.closest('.list-del');
  if (!btn) return;
  if (!confirm('해당 내역을 삭제하시겠습니까?')) return;
  const sub = btn.dataset.type === 'expense' ? 'expenses' : 'transfers';
  try {
    await deleteDoc(doc(db, 'settle_trips', currentTripId, sub, btn.dataset.id));
    toast('삭제되었습니다.');
    window.refreshData();
  } catch (err) { toast('오류: ' + err.message); }
});

// ── 통계 / 정산 계산 ──
function computeMemberSummary() {
  const paid = {}, share = {};
  allDataCache.expenses.forEach(e => {
    const amt = Number(e.amount);
    paid[e.payer] = (paid[e.payer] || 0) + amt;
    if (!e.memberData.includes(':')) {
      const mems = e.memberData.split(',').map(m => m.trim()).filter(Boolean);
      const split = amt / mems.length;
      mems.forEach(m => { share[m] = (share[m] || 0) + split; });
    } else {
      e.memberData.split(',').forEach(p => {
        const [m, cost] = p.split(':');
        share[m.trim()] = (share[m.trim()] || 0) + Number(cost);
      });
    }
  });
  const all = new Set([...Object.keys(paid), ...Object.keys(share)]);
  return [...all].map(m => ({
    name: m, paid: Math.round(paid[m] || 0), share: Math.round(share[m] || 0),
    balance: Math.round((paid[m] || 0) - (share[m] || 0)),
  }));
}

window.refreshStats = () => {
  const el = document.getElementById('memberBalanceList');
  const data = computeMemberSummary();
  if (!data.length) { el.innerHTML = '<p class="text-sm text-center" style="padding:16px 0;">데이터 없음</p>'; return; }
  el.innerHTML = data.map(m => {
    const cls = m.balance > 0 ? 'balance-pos' : m.balance < 0 ? 'balance-neg' : 'balance-zero';
    const sign = m.balance > 0 ? '+' : '';
    return `<div class="balance-row">
      <div><div style="font-weight:700;">${escHtml(m.name)}</div><div class="text-sm">결제 ${fmt(m.paid)} / 부담 ${fmt(m.share)}</div></div>
      <div class="${cls}">${sign}${fmt(m.balance)}</div>
    </div>`;
  }).join('');
};

window.showSettlement = () => {
  // owed[p] > 0: p가 그룹에 더 내야 할 돈(빚) / owed[p] < 0: p가 돌려받아야 할 돈
  const owed = {};
  function add(p, amt) { owed[p] = (owed[p] || 0) + amt; }

  let report = `=== [${currentTripName}] 정산 결과 ===\n\n`;
  let totalSpent = 0;
  report += '[지출 내역]\n';
  allDataCache.expenses.forEach(e => {
    const amt = Number(e.amount);
    totalSpent += amt;
    report += `- ${e.desc}: ${fmt(amt)} (${e.payer} 결제)\n`;
    add(e.payer, -amt);
    if (!e.memberData.includes(':')) {
      const mems = e.memberData.split(',').map(m => m.trim()).filter(Boolean);
      const split = amt / mems.length;
      mems.forEach(m => add(m, split));
    } else {
      e.memberData.split(',').forEach(p => {
        const [m, cost] = p.split(':');
        add(m.trim(), Number(cost));
      });
    }
  });
  report += `\n총 지출: ${fmt(totalSpent)}\n`;

  if (allDataCache.transfers.length) {
    report += '\n[중간 송금 내역]\n';
    allDataCache.transfers.forEach(t => {
      report += `- ${t.sender} → ${t.receiver}: ${fmt(t.amount)}\n`;
      add(t.sender, -Number(t.amount));
      add(t.receiver, Number(t.amount));
    });
  }

  report += '\n[최종 정산 요청]\n';
  // 전체 잔액 기준 최소 송금 횟수 계산 (최대 빚 ↔ 최대 크레딧 그리디 매칭)
  const debtors = [], creditors = [];
  Object.entries(owed).forEach(([p, v]) => {
    const r = Math.round(v);
    if (r > 10) debtors.push({ name: p, amt: r });
    else if (r < -10) creditors.push({ name: p, amt: -r });
  });
  debtors.sort((a, b) => b.amt - a.amt);
  creditors.sort((a, b) => b.amt - a.amt);

  let hasAny = false;
  let di = 0, ci = 0;
  while (di < debtors.length && ci < creditors.length) {
    const d = debtors[di], c = creditors[ci];
    const pay = Math.min(d.amt, c.amt);
    report += `${d.name} → ${c.name} : ${fmt(pay)}\n`;
    hasAny = true;
    d.amt -= pay; c.amt -= pay;
    if (d.amt <= 10) di++;
    if (c.amt <= 10) ci++;
  }
  if (!hasAny) report += '정산할 내용이 없습니다.';

  const box = document.getElementById('resultArea');
  box.innerHTML = `<div class="result-box">${escHtml(report)}</div>
    <button class="btn mt8" style="width:100%;" onclick="copySettlement()"><svg width="15" height="15" style="vertical-align:-2px;margin-right:4px;"><use href="#ic-doc"/></svg>결과 복사하기</button>`;
  box.dataset.report = report;
  box.classList.remove('hidden');
  box.scrollIntoView({ behavior: 'smooth' });
};

window.copySettlement = async () => {
  const box = document.getElementById('resultArea');
  try {
    await navigator.clipboard.writeText(box.dataset.report || '');
    toast('복사되었습니다.');
  } catch (e) { toast('복사 실패: ' + e.message); }
};

// ── CSV 내보내기 ──
window.downloadCSV = () => {
  if (!allDataCache.expenses.length && !allDataCache.transfers.length) { toast('내보낼 데이터가 없습니다.'); return; }
  let csv = '﻿구분,날짜,내용,금액,결제자,참여자\n';
  allDataCache.expenses.forEach(e => { csv += `지출,${e.date},${e.desc},${e.amount},${e.payer},"${e.memberData}"\n`; });
  allDataCache.transfers.forEach(t => { csv += `송금,${t.date},${t.sender},${t.amount},${t.receiver},${t.memo || ''}\n`; });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `${currentTripName}_정산내역.csv`; a.click();
  toast('CSV 파일을 저장했습니다.');
};

// ── 데이터 삭제 및 종료 ──
window.deleteData = async () => {
  if (!confirm('데이터를 삭제하면 복구할 수 없습니다.\n삭제 전 CSV 저장을 권장합니다.\n계속하시겠습니까?')) return;
  try {
    const data = await fetchTripData();
    await Promise.all([
      ...data.expenses.map(e => deleteDoc(doc(db, 'settle_trips', currentTripId, 'expenses', e.id))),
      ...data.transfers.map(t => deleteDoc(doc(db, 'settle_trips', currentTripId, 'transfers', t.id))),
    ]);
    await updateDoc(doc(db, 'settle_trips', currentTripId), { status: 'done' });
    toast('삭제되었습니다.');
    setTimeout(() => location.reload(), 1200);
  } catch (e) { toast('오류: ' + e.message); }
};
</script>
